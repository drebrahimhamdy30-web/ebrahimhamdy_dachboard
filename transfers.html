<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحويلات - صيدلية د. إبراهيم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #dee2e6;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-weight: bold; color: #333; }
        .filter-control { padding: 8px; border-radius: 5px; border: 1px solid #ccc; min-width: 150px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html">🛒 سجل المشتريات</a>
            <a href="transfers.html" class="active">🔄 التحويلات</a>
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">إدارة تحويلات الفروع 🔄</h2>

            <div class="filter-section">
                <div class="filter-group">
                    <label>الحالة:</label>
                    <select id="status-filter" class="filter-control" onchange="applyFilters()">
                        <option value="all">الكل</option>
                        <option value="pending" selected>قيد الانتظار ⏳</option>
                        <option value="transferred">تم التحويل ✅</option>
                        <option value="unavailable">غير متوفر ❌</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>الفرع الطالب:</label>
                    <select id="branch-filter" class="filter-control" onchange="applyFilters()">
                        <option value="all">كل الفروع</option>
                    </select>
                </div>
                <button onclick="loadTransfers()" class="btn-success" style="width: auto; margin-right: auto;">تحديث البيانات 🔄</button>
            </div>

            <div id="branch-tag" style="text-align: center; margin-bottom: 10px; font-weight: bold; color: #1565c0;"></div>

            <div style="overflow-x: auto;">
                <table id="transfers-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>من (الطالب)</th>
                            <th>إلى (الفرع)</th>
                            <th>الصنف</th>
                            <th>الكمية</th>
                            <th>ملاحظة الفرع</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="8" style="text-align:center;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>

    <script>
        let rawData = [];
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch');

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            const branchTag = document.getElementById('branch-tag');
            if (branchTag) branchTag.innerText = "فرعك الحالي: " + (userBranch || activeUser);
            window.onload = loadTransfers;
        }

        async function loadTransfers() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">جاري جلب التحويلات...</td></tr>';
            
            try {
                const response = await fetchData(); 
                if (response && response[0] && response[0].data) {
                    // تصفية البيانات الأساسية (التحويلات التي تخصني فقط)
                    rawData = response[0].data.filter(item => {
                        const typeVal = (item.type || '').toString();
                        const isTransfer = (typeVal === 'transfer' || typeVal === 'تحويل');
                        // مطابقة مرنة للفرع واليوزر
                        const involvesMe = (item.user === activeUser || 
                                            (item.branch && item.branch.includes(userBranch || activeUser)) ||
                                            (userBranch && item.branch.includes(userBranch)));
                        return isTransfer && involvesMe;
                    });
                    
                    populateBranchFilter(rawData);
                    applyFilters();
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد بيانات</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:red;">خطأ في الاتصال</td></tr>';
            }
        }

        function populateBranchFilter(data) {
            const branchFilter = document.getElementById('branch-filter');
            const branches = [...new Set(data.map(item => item.user))]; // جلب الفروع الطالبة الفريدة
            
            branchFilter.innerHTML = '<option value="all">كل الفروع</option>';
            branches.forEach(br => {
                if(br) branchFilter.innerHTML += `<option value="${br}">${br}</option>`;
            });
        }

        function applyFilters() {
            const statusVal = document.getElementById('status-filter').value;
            const branchVal = document.getElementById('branch-filter').value;

            const filtered = rawData.filter(item => {
                const itemStatus = (item.state || 'pending').toString();
                const statusMatch = (statusVal === 'all') || (itemStatus === statusVal);
                const branchMatch = (branchVal === 'all') || (item.user === branchVal);
                return statusMatch && branchMatch;
            });

            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد نتائج تطابق الفلتر</td></tr>';
                return;
            }

            items.forEach((order, index) => {
                const row = document.createElement('tr');
                const isTargetBranch = (order.branch && order.branch.includes(userBranch || activeUser));
                const isDisabled = isTargetBranch ? '' : 'disabled';
                const currentState = (order.state || 'pending').toString();
                const displayId = order.id || (index + 1);

                row.innerHTML = `
                    <td>${displayId}</td>
                    <td style="color: #1976d2;">${order.user || '-'}</td>
                    <td style="font-weight: bold;">${order.branch || '-'}</td>
                    <td>${order.item || '-'}</td>
                    <td>${order.qty || '0'}</td>
                    <td>
                        <input type="text" class="note-input" value="${order.company || ''}" 
                               placeholder="ملاحظة..." ${isDisabled}
                               style="width: 110px; padding: 5px; border-radius: 4px; border: 1px solid #ddd;">
                    </td>
                    <td>
                        <select class="form-select" ${isDisabled} style="padding: 5px; border-radius: 4px;">
                            <option value="pending" ${currentState === 'pending' || currentState === 'null' ? 'selected' : ''}>انتظار ⏳</option>
                            <option value="transferred" ${currentState === 'transferred' ? 'selected' : ''}>تم التحويل ✅</option>
                            <option value="unavailable" ${currentState === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                        </select>
                    </td>
                    <td>
                        ${isTargetBranch ? 
                            `<button class="btn-success" style="width:auto; padding:5px 10px;" onclick="saveTransfer('${displayId}', this)">رد</button>` : 
                            '<span style="font-size:12px; color:gray;">بانتظار الرد</span>'}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function saveTransfer(id, btn) {
            const row = btn.closest('tr');
            const newState = row.querySelector('select').value;
            const newNote = row.querySelector('.note-input').value;
            
            btn.disabled = true;
            btn.innerText = "⏳";

            const success = await updateData({ 
                id: id, 
                status: newState, 
                company: newNote, 
                action: "update_status" 
            });

            if (success) {
                alert("تم التحديث ✅");
                loadTransfers(); 
            } else {
                alert("فشل التحديث ❌");
                btn.disabled = false;
                btn.innerText = "رد";
            }
        }
    </script>
</body>
</html>
