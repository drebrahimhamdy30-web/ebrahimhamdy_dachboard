<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحويلات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تنسيقات الجدول المدمج */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 0.85rem; }
        th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #edf2f7; }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 700; }
        .filter-control { padding: 4px; border-radius: 4px; border: 1px solid #cbd5e0; font-size: 0.8rem; background: #fff; }
        .status-select { padding: 3px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #cbd5e0; width: 100%; }
        .note-input { width: 95%; padding: 3px 6px; border-radius: 4px; border: 1px solid #cbd5e0; font-size: 0.8rem; }
        .btn-action { background: var(--success); color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-action:disabled { background: #cbd5e0; cursor: not-allowed; }
        .tag-info { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html"><i class="fas fa-plus"></i> مدخلات</a>
            <a href="purchases.html"><i class="fas fa-shopping-cart"></i> مشتريات</a>
            <a href="transfers.html" class="active"><i class="fas fa-exchange-alt"></i> تحويلات</a>
            <a href="inventory.html"><i class="fas fa-list"></i> جرد</a> 
            <a href="notifications.html"><i class="fas fa-bell"></i> إشعارات</a> 
        </div>
        <div class="user-info" style="color: white; font-size: 0.8rem;">
            <span id="nav-user"></span>
            <button onclick="logout()" style="background:transparent; border:1px solid #fff; color:white; border-radius:4px; cursor:pointer; margin-right:10px; padding: 2px 8px;">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; font-size: 1.1rem; color: var(--primary);">🔄 إدارة تحويلات الفروع</h3>
                <button onclick="loadTransfers()" class="btn-done" style="background: var(--accent); padding: 5px 15px;">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>

            <div class="filter-box" style="display: flex; gap: 10px; flex-wrap: wrap; padding: 8px; background: #f8fafc;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="font-size: 0.8rem;">📦 الجهة:</span>
                    <select id="direction-filter" class="filter-control" onchange="applyFilters()">
                        <option value="inbound">مهامي الواردة 📥</option>
                        <option value="outbound">طلباتي المرسلة 📤</option>
                        <option value="all">الكل</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="font-size: 0.8rem;">⚙️ الحالة:</span>
                    <select id="status-filter" class="filter-control" onchange="applyFilters()">
                        <option value="pending">انتظار ⏳</option>
                        <option value="transferred">تم ✅</option>
                        <option value="unavailable">نقص ❌</option>
                        <option value="all">الكل</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="font-size: 0.8rem;">🏢 الفرع:</span>
                    <select id="branch-filter" class="filter-control" onchange="applyFilters()">
                        <option value="all">كل الفروع</option>
                    </select>
                </div>
            </div>

            <div id="branch-tag" class="tag-info" style="text-align: center; margin: 5px 0; font-weight: bold; color: var(--accent);"></div>

            <div style="overflow-x: auto;">
                <table id="transfers-table">
                    <thead>
                        <tr>
                            <th>المسار (من ⬅️ إلى)</th>
                            <th>الصنف</th>
                            <th>الكمية</th>
                            <th>ملاحظة الرد</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="6" style="text-align:center; padding: 20px;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let rawData = [];
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch') || activeUser;

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            const branchTag = document.getElementById('branch-tag');
            if (branchTag) branchTag.innerText = "📍 فرعك الحالي: " + userBranch;
            window.onload = loadTransfers;
        }

        async function loadTransfers() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">⏳ جاري جلب البيانات...</td></tr>';
            
            try {
                const response = await fetchData(); 
                if (response && response[0]?.data) {
                    rawData = response[0].data.filter(item => {
                        const typeVal = (item.type || '').toString();
                        const isTransfer = (typeVal === 'transfer' || typeVal === 'تحويل');
                        const isRelevant = (item.branch?.includes(userBranch)) || (item.user === activeUser);
                        return isTransfer && isRelevant;
                    });
                    
                    populateBranchOptions(rawData);
                    applyFilters(); 
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا توجد تحويلات</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">❌ خطأ في الاتصال</td></tr>';
            }
        }

        function populateBranchOptions(data) {
            const branchFilter = document.getElementById('branch-filter');
            const branches = [...new Set(data.map(item => item.user))].filter(b => b);
            branchFilter.innerHTML = '<option value="all">كل الفروع</option>';
            branches.forEach(br => {
                branchFilter.innerHTML += `<option value="${br}">${br}</option>`;
            });
        }

        function applyFilters() {
            const directionVal = document.getElementById('direction-filter').value;
            const statusVal = document.getElementById('status-filter').value;
            const branchVal = document.getElementById('branch-filter').value;

            const filtered = rawData.filter(item => {
                const isTarget = (item.branch?.includes(userBranch));
                const isSource = (item.user === activeUser);
                
                let dirMatch = (directionVal === 'all') || 
                               (directionVal === 'inbound' && isTarget) || 
                               (directionVal === 'outbound' && isSource);

                const itemStatus = item.state || 'pending';
                const statMatch = (statusVal === 'all') || (itemStatus === statusVal);
                const brMatch = (branchVal === 'all') || (item.user === branchVal);

                return dirMatch && statMatch && brMatch;
            });

            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color: #94a3b8;">لا توجد نتائج تطابق البحث</td></tr>';
                return;
            }

            items.forEach((item) => {
                const isTargetBranch = (item.branch?.includes(userBranch));
                const currentState = item.state || 'pending';
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td style="font-size:0.8rem;">
                        <span style="color:#3182ce;">${item.user}</span> 
                        <i class="fas fa-long-arrow-alt-left" style="margin:0 4px; color:#cbd5e0;"></i> 
                        <span style="font-weight:bold;">${item.branch}</span>
                    </td>
                    <td style="text-align:right; font-weight:500;">${item.item_name || item.item || '-'}</td>
                    <td style="font-weight:bold;">${item.qty || '0'}</td>
                    <td>
                        <input type="text" id="note-${item.id}" class="note-input" value="${item.company || ''}" 
                               placeholder="..." ${!isTargetBranch ? 'disabled' : ''}>
                    </td>
                    <td>
                        <select id="stat-${item.id}" class="status-select" ${!isTargetBranch ? 'disabled' : ''}>
                            <option value="pending" ${currentState === 'pending' ? 'selected' : ''}>انتظار ⏳</option>
                            <option value="transferred" ${currentState === 'transferred' ? 'selected' : ''}>تم ✅</option>
                            <option value="unavailable" ${currentState === 'unavailable' ? 'selected' : ''}>نقص ❌</option>
                        </select>
                    </td>
                    <td>
                        ${isTargetBranch ? 
                            `<button class="btn-action" onclick="saveTransfer('${item.id}', this)"><i class="fas fa-reply"></i></button>` : 
                            '<span style="font-size:0.7rem; color:#94a3b8;">بانتظار الرد</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function saveTransfer(id, btn) {
            const status = document.getElementById(`stat-${id}`).value;
            const notes = document.getElementById(`note-${id}`).value;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const success = await updateData({ 
                id: id, 
                status: status, 
                company: notes, 
                type: "تحويل", 
                action: "update_status" 
            });

            if (success) {
                btn.style.background = "#48bb78";
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => loadTransfers(), 1000);
            } else {
                alert("فشل التحديث");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-reply"></i>';
            }
        }
    </script>
</body>
</html>
