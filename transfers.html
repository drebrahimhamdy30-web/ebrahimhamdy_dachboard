<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحويلات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 0.85rem; }
        th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #edf2f7; vertical-align: middle; }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 700; }
        .filter-control { padding: 4px; border-radius: 4px; border: 1px solid #cbd5e0; font-size: 0.8rem; background: #fff; }
        .status-select { padding: 3px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #cbd5e0; width: 100%; }
        .note-input { width: 95%; padding: 3px 6px; border-radius: 4px; border: 1px solid #cbd5e0; font-size: 0.8rem; }
        .btn-action { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-action:disabled { background: #cbd5e0; cursor: not-allowed; }
        .tag-info { font-size: 0.75rem; color: #64748b; margin-top: 5px; }
        .dir-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; margin-right: 5px; }
        .in-badge { background: #e3f2fd; color: #1976d2; }
        .out-badge { background: #fff3e0; color: #f57c00; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html"><i class="fas fa-plus"></i> مدخلات</a>
            <a href="purchases.html"><i class="fas fa-shopping-cart"></i> مشتريات</a>
            <a href="transfers.html" class="active"><i class="fas fa-exchange-alt"></i> تحويلات</a>
            <a href="inventory.html"><i class="fas fa-list"></i> جرد</a> 
            <a href="notifications.html"><i class="fas fa-bell"></i> إشعارات</a> 
        </div>
        <div class="user-info" style="color: white; font-size: 0.8rem;">
            <span id="nav-user"></span>
            <button onclick="logout()" style="background:transparent; border:1px solid #fff; color:white; border-radius:4px; cursor:pointer; margin-right:10px; padding: 2px 8px;">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; font-size: 1.1rem; color: var(--primary);">🔄 إدارة تحويلات الفروع</h3>
                <button onclick="loadTransfers()" style="background: #3498db; padding: 5px 15px; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>

            <div class="filter-box" style="display: flex; gap: 10px; flex-wrap: wrap; padding: 10px; background: #f8fafc; border-radius: 8px; margin-bottom: 10px;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="font-size: 0.8rem;">📦 النوع:</span>
                    <select id="direction-filter" class="filter-control" onchange="applyFilters()">
                        <option value="inbound">تحويلات واردة إلينا 📥</option>
                        <option value="outbound">طلبات مرسلة لغيرنا 📤</option>
                        <option value="all">الكل</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="font-size: 0.8rem;">⚙️ الحالة:</span>
                    <select id="status-filter" class="filter-control" onchange="applyFilters()">
                        <option value="pending">انتظار ⏳</option>
                        <option value="transferred">تم ✅</option>
                        <option value="unavailable">نقص ❌</option>
                        <option value="all">الكل</option>
                    </select>
                </div>
            </div>

            <div id="branch-tag" class="tag-info" style="text-align: center; margin-bottom: 10px; font-weight: bold; color: #e67e22;"></div>

            <div style="overflow-x: auto;">
                <table id="transfers-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">المسار (من ⬅️ إلى)</th>
                            <th style="width: 25%;">الصنف</th>
                            <th style="width: 8%;">الكمية</th>
                            <th style="width: 20%;">ملاحظة / رد</th>
                            <th style="width: 15%;">الحالة</th>
                            <th style="width: 12%;">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="6" style="text-align:center; padding: 20px;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let rawData = [];
        const activeUser = checkAuth();
        // نستخدم الفرع المخزن أو اسم المستخدم كفرع افتراضي
        const userBranchName = localStorage.getItem('userBranch') || "المعمورة"; 

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            const branchTag = document.getElementById('branch-tag');
            if (branchTag) branchTag.innerText = "📍 فرعك الحالي: " + userBranchName;
            window.onload = loadTransfers;
        }

        async function loadTransfers() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">⏳ جاري جلب البيانات...</td></tr>';
            
            try {
                // استخدام الدالة fetchOrders لأنها تجلب كل العمليات
                const response = await fetchOrders(); 
                let items = (response && response[0]?.data) ? response[0].data : (response.data || response);

                if (Array.isArray(items)) {
                    rawData = items.filter(item => {
                        const typeVal = item.type || '';
                        // التأكد أن العملية هي تحويل
                        return typeVal === "تحويل";
                    });
                    applyFilters(); 
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا توجد بيانات متاحة</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">❌ خطأ في الاتصال بالسيرفر</td></tr>';
            }
        }

        function applyFilters() {
            const directionVal = document.getElementById('direction-filter').value;
            const statusVal = document.getElementById('status-filter').value;

            const filtered = rawData.filter(item => {
                const isTarget = (item.branch === userBranchName); // الفرع الموجه إليه التحويل
                const isSource = (item.user === userBranchName);   // الفرع الذي طلب التحويل
                
                let dirMatch = false;
                if (directionVal === 'all') dirMatch = (isTarget || isSource);
                if (directionVal === 'inbound') dirMatch = isTarget;
                if (directionVal === 'outbound') dirMatch = isSource;

                const itemStatus = item.state || 'pending';
                const statMatch = (statusVal === 'all') || (itemStatus === statusVal);

                return dirMatch && statMatch;
            });

            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color: #94a3b8;">لا توجد تحويلات حالياً</td></tr>';
                return;
            }

            items.forEach((item) => {
                // إذا كان فرعي هو "الموجه إليه" (branch)، فلي حق الرد
                const canReply = (item.branch === userBranchName);
                const currentState = item.state || 'pending';
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td>
                        <div style="font-size:0.8rem; font-weight:bold;">${item.user} ⬅️ ${item.branch}</div>
                        <span class="dir-badge ${canReply ? 'in-badge' : 'out-badge'}">
                            ${canReply ? 'وارد إليك' : 'صادر منك'}
                        </span>
                    </td>
                    <td style="text-align:right;">
                        <div style="font-weight:600;">${item.item_name || '-'}</div>
                        <div style="font-size:0.7rem; color:#64748b;">كود: ${item.item_code || '-'}</div>
                    </td>
                    <td style="font-weight:bold; color:#2c3e50;">${item.qty || '0'}</td>
                    <td>
                        <input type="text" id="note-${item.id}" class="note-input" 
                               value="${item.company || ''}" placeholder="ملاحظة الرد..." 
                               ${!canReply ? 'disabled' : ''}>
                    </td>
                    <td>
                        <select id="stat-${item.id}" class="status-select" ${!canReply ? 'disabled' : ''}>
                            <option value="pending" ${currentState === 'pending' ? 'selected' : ''}>⏳ انتظار</option>
                            <option value="transferred" ${currentState === 'transferred' ? 'selected' : ''}>✅ تم</option>
                            <option value="unavailable" ${currentState === 'unavailable' ? 'selected' : ''}>❌ نقص</option>
                        </select>
                    </td>
                    <td>
                        ${canReply ? 
                            `<button class="btn-action" onclick="saveTransfer('${item.id}', this)"><i class="fas fa-reply"></i> رد</button>` : 
                            '<span style="font-size:0.75rem; color:#94a3b8;">بانتظار الطرف الآخر</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function saveTransfer(id, btn) {
            const status = document.getElementById(`stat-${id}`).value;
            const notes = document.getElementById(`note-${id}`).value;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            // إرسال التحديث للسيرفر
            const success = await updateData({ 
                id: id, 
                status: status, 
                company: notes, 
                type: "تحويل", 
                action: "update_status" 
            });

            if (success) {
                btn.style.background = "#27ae60";
                btn.innerHTML = '<i class="fas fa-check"></i> تم';
                setTimeout(() => loadTransfers(), 1000);
            } else {
                alert("فشل تحديث الحالة");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-reply"></i> رد';
            }
        }
    </script>
</body>
</html>
