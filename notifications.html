<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الإشعارات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notif-card {
            background: white; padding: 15px; margin-bottom: 12px;
            border-radius: 8px; border-right: 6px solid #28a745;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .notif-card.completed { border-right-color: #6c757d; opacity: 0.8; background: #f8f9fa; }
        .meta { font-size: 0.85em; color: #666; margin-top: 8px; border-top: 1px dotted #eee; padding-top: 8px; display: flex; justify-content: space-between; align-items: center; }
        .branch-tag { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .action-area { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
        .comment-input { flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .filter-box { display: flex; gap: 20px; background: #fffde7; padding: 15px; border-radius: 8px; border: 1px solid #fbc02d; margin-bottom: 15px; align-items: center; font-weight: bold; }
        .btn-done { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn-done:hover { background: #218838; }
        .btn-done:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="inventory.html">📋 الجرد</a> 
            <a href="notifications.html" class="active">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">🔔 ملاحظات وإشعارات الفروع</h2>
            
            <div class="filter-box">
                <span>تصفية:</span>
                <label><input type="checkbox" id="showSent" checked onchange="applyFilter()"> طلباتي 📤</label>
                <label><input type="checkbox" id="showReceived" checked onchange="applyFilter()"> طلبات واردة 📥</label>
                <button onclick="loadNotifications()" class="btn-success" style="width:auto; margin-right:auto; padding:5px 20px;">تحديث 🔄</button>
            </div>

            <div id="notif-container">
                <p style="text-align:center;">جاري تحميل الإشعارات...</p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        // جلب الفرع من localStorage أو استخدام اسم المستخدم كفرع افتراضي
        const userBranch = localStorage.getItem('userBranch') || activeUser || '';
        let allItems = [];

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadNotifications;
        }

        async function loadNotifications() {
            const container = document.getElementById('notif-container');
            container.innerHTML = '<p style="text-align:center;">⏳ جاري تحميل البيانات من السيرفر...</p>';
            
            try {
                const response = await fetchFromN8N('notifications');
                console.log("📥 البيانات المستقبلة:", response);

                // معالجة ذكية لشكل البيانات القادمة من n8n
                if (Array.isArray(response)) {
                    if (response.length > 0 && response[0].data && Array.isArray(response[0].data)) {
                        allItems = response[0].data;
                    } else {
                        allItems = response;
                    }
                } else if (response && response.data) {
                    allItems = response.data;
                } else {
                    allItems = [];
                }

                if (allItems.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#ff9800;">⚠️ لا توجد إشعارات حالياً</p>';
                } else {
                    applyFilter();
                }
            } catch (e) {
                console.error("❌ خطأ:", e);
                container.innerHTML = '<p style="text-align:center; color:red;">❌ خطأ في تحميل البيانات</p>';
            }
        }

        function applyFilter() {
            const container = document.getElementById('notif-container');
            const sentChecked = document.getElementById('showSent').checked;
            const receivedChecked = document.getElementById('showReceived').checked;

            if (!sentChecked && !receivedChecked) {
                container.innerHTML = '<p style="text-align:center; color:#999;">📭 اختر فلتر واحد على الأقل</p>';
                return;
            }

            const filtered = allItems.filter(item => {
                const sender = String(item.branch || '').trim();
                const receiver = String(item.target_branch || '').trim();
                const current = String(userBranch).trim();

                const isSent = (sender === current);
                const isReceived = (receiver === current);

                if (sentChecked && isSent) return true;
                if (receivedChecked && isReceived) return true;
                return false;
            });

            renderNotifications(filtered);
        }

        function renderNotifications(items) {
            const container = document.getElementById('notif-container');
            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">📭 لا يوجد نتائج</p>';
                return;
            }

            container.innerHTML = '';
            
            // ترتيب من الأحدث للأقدم
            items.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

            items.forEach(item => {
                const isDone = (item.done === true || item.done === "true" || item.done === "تم");
                const div = document.createElement('div');
                div.className = `notif-card ${isDone ? 'completed' : ''}`;
                
                const noteText = item.note || 'إشعار بدون نص';
                const branchFrom = item.branch || '؟';
                const branchTo = item.target_branch || '؟';
                const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleString('ar-EG') : '؟';
                const commentValue = (item.comment && item.comment !== 'null' && item.comment !== 'Null') ? item.comment : '';
                
                // تحويل الـ ID لنص لضمان عدم وجود أخطاء في الـ HTML
                const safeId = String(item.id);

                div.innerHTML = `
                    <div style="font-weight:bold; font-size:1.1em; margin-bottom:8px;">📌 ${noteText}</div>
                    <div class="meta">
                        <span>من: <b class="branch-tag">${branchFrom}</b> ⬅️ إلى: <b class="branch-tag">${branchTo}</b></span>
                        <span style="color:#888; font-size:0.9em;">📅 ${dateStr}</span>
                    </div>
                    <div class="action-area">
                        <input type="text" id="comm-${safeId}" class="comment-input" placeholder="أضف تعليقاً..." value="${commentValue}">
                        ${!isDone ? `<button onclick="handleDone(event, '${safeId}')" class="btn-done">✅ تم</button>` : '<span style="color:#999; font-weight:bold;">✓ تم إنجازه</span>'}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function handleDone(event, id) {
            // منع السلوك الافتراضي للزر
            if(event) event.preventDefault();
            
            const btn = event.target;
            const comment = document.getElementById(`comm-${id}`).value;
            
            const updatePayload = {
                id: id,
                action: "update_status",
                comment: comment,
                done: "تم", // نرسل "تم" كنص لتسهيل الكتابة في Google Sheets
                updatedAt: new Date().toISOString()
            };

            // تغيير حالة الزر لمنع الضغط المتكرر
            const originalText = btn.innerText;
            btn.innerText = "⏳...";
            btn.disabled = true;

            console.log("📤 إرسال تحديث:", updatePayload);
            
            try {
                const success = await updateData(updatePayload);
                if (success) {
                    alert("✅ تم تحديث الحالة بنجاح");
                    await loadNotifications(); // تحديث القائمة
                } else {
                    throw new Error("فشل في الرد من السيرفر");
                }
            } catch (error) {
                console.error("Update error:", error);
                alert("❌ فشل التحديث. تأكد من تفعيل CORS في n8n أو مراجعة الكونسول.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
