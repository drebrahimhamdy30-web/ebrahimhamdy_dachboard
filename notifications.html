<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html"><i class="fas fa-plus"></i> مدخلات</a>
            <a href="purchases.html"><i class="fas fa-shopping-cart"></i> مشتريات</a>
            <a href="transfers.html"><i class="fas fa-exchange-alt"></i> تحويلات</a>
            <a href="inventory.html"><i class="fas fa-list"></i> جرد</a> 
            <a href="notifications.html" class="active"><i class="fas fa-bell"></i> إشعارات</a> 
        </div>
        <div class="user-info" style="color: white; font-size: 0.8rem;">
            <span id="nav-user"></span>
            <button onclick="logout()" style="background:transparent; border:1px solid #fff; color:white; border-radius:4px; cursor:pointer; margin-right:10px;">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; font-size: 1.1rem; color: var(--primary);">🔔 إشعارات الفروع</h3>
                <button onclick="loadNotifications()" class="btn-done" style="background: var(--accent);">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>
            
            <div class="filter-box">
                <label><input type="checkbox" id="showReceived" checked onchange="applyFilter()"> واردة 📥</label>
                <label><input type="checkbox" id="showSent" onchange="applyFilter()"> مرسلة 📤</label>
                <label style="border-right: 1px solid #ddd; padding-right: 10px;">
                    <input type="checkbox" id="hideDone" checked onchange="applyFilter()"> قيد الانتظار
                </label>
            </div>

            <div id="notif-container">
                <p style="text-align:center;">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch') || activeUser || '';
        let allItems = [];

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadNotifications;
        }

        async function loadNotifications() {
            const container = document.getElementById('notif-container');
            container.innerHTML = '<p style="text-align:center;">⏳ جاري التحديث...</p>';
            try {
                const response = await fetchFromN8N('notifications');
                allItems = (response[0]?.data) ? response[0].data : (response.data || response);
                applyFilter();
            } catch (e) {
                container.innerHTML = '<p style="text-align:center; color:red;">❌ خطأ في الاتصال</p>';
            }
        }

        function applyFilter() {
            const container = document.getElementById('notif-container');
            const filtered = allItems.filter(item => {
                const current = String(userBranch).trim();
                const isDone = (item.done === "تم" || item.done === true || item.done === "true");
                if (document.getElementById('hideDone').checked && isDone) return false;
                
                const isSent = (String(item.branch).trim() === current);
                const isReceived = (String(item.target_branch).trim() === current);
                return (document.getElementById('showSent').checked && isSent) || 
                       (document.getElementById('showReceived').checked && isReceived);
            });
            renderNotifications(filtered);
        }

        function renderNotifications(items) {
            const container = document.getElementById('notif-container');
            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999; font-size:0.9rem;">📭 لا يوجد بيانات</p>';
                return;
            }
            container.innerHTML = '';
            items.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));

            items.forEach(item => {
                const isDone = (item.done === "تم" || item.done === true || item.done === "true");
                const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleString('ar-EG', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'numeric'}) : '؟';
                const div = document.createElement('div');
                div.className = `notif-card ${isDone ? 'completed' : ''}`;
                
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <span style="font-weight:700; color:#2d3748;">📌 ${item.note || 'إشعار'}</span>
                        <span style="color:#a0aec0; font-size:0.75rem;">${dateStr}</span>
                    </div>
                    <div class="meta">
                        <span style="font-size:0.85rem;">
                            <b class="branch-tag">${item.branch}</b> <i class="fas fa-arrow-left" style="font-size:0.7rem; color:#cbd5e0;"></i> <b class="branch-tag">${item.target_branch}</b>
                        </span>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <input type="text" id="comm-${item.id}" class="comment-input" placeholder="تعليق..." value="${item.comment !== 'null' ? (item.comment || '') : ''}">
                            ${!isDone ? `<button onclick="handleDone(event, '${item.id}')" class="btn-done">تم</button>` : '<i class="fas fa-check-double" style="color:var(--success);"></i>'}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function handleDone(event, id) {
            const btn = event.target;
            const comment = document.getElementById(`comm-${id}`).value;
            btn.innerText = "...";
            if (await updateData({ id, type: "إشعار", action: "update_status", comment, done: "تم", updatedAt: new Date().toISOString() })) {
                loadNotifications();
            } else {
                alert("فشل التحديث");
                btn.innerText = "تم";
            }
        }
    </script>
</body>
</html>
