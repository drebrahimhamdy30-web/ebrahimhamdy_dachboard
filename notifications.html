<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الإشعارات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notif-card {
            background: white; padding: 15px; margin-bottom: 12px;
            border-radius: 8px; border-right: 6px solid #28a745;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .notif-card.completed { border-right-color: #6c757d; opacity: 0.8; background: #f8f9fa; }
        .meta { font-size: 0.85em; color: #666; margin-top: 8px; border-top: 1px dotted #eee; padding-top: 8px; display: flex; justify-content: space-between; }
        .note-content { font-weight: bold; color: #333; font-size: 1.1em; }
        .branch-tag { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; }
        .action-area { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
        .comment-input { flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .filter-section { 
            display: flex; gap: 15px; margin-bottom: 15px; 
            background: #fffde7; padding: 15px; border-radius: 8px; 
            border: 1px solid #fbc02d; align-items: center;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="inventory.html">📋 الجرد</a> 
            <a href="notifications.html" class="active">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">🔔 ملاحظات وإشعارات الفروع</h2>
            
            <div class="filter-section">
                <span>تصفية: </span>
                <label><input type="checkbox" id="myRequests" checked onchange="applyFilter()"> طلباتي 📤</label>
                <label><input type="checkbox" id="incomingRequests" checked onchange="applyFilter()"> طلبات واردة 📥</label>
                <button onclick="loadNotifications()" class="btn-success" style="width: auto; margin-right: auto;">تحديث 🔄</button>
            </div>

            <div id="notif-container"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch'); // تأكد أنها مخزنة بـ "المعمورة" أو "سان سكيفانو"
        let allData = [];

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadNotifications;
        }

        async function loadNotifications() {
            const container = document.getElementById('notif-container');
            container.innerHTML = '<p style="text-align:center;">جاري التحميل...</p>';
            try {
                const response = await fetchFromN8N('notifications');
                // الدخول للبيانات بناءً على الـ Aggregate في n8n
                allData = (response && response[0] && response[0].data) ? response[0].data : (Array.isArray(response) ? response : []);
                applyFilter();
            } catch (e) {
                container.innerHTML = '<p style="text-align:center; color:red;">خطأ في الاتصال</p>';
            }
        }

        function applyFilter() {
            const showMyReq = document.getElementById('myRequests').checked;
            const showInbound = document.getElementById('incomingRequests').checked;
            
            const filtered = allData.filter(item => {
                const amISender = String(item.branch).trim() === String(userBranch).trim();
                const amIReceiver = String(item.target_branch).trim() === String(userBranch).trim();
                
                if (showMyReq && amISender) return true;
                if (showInbound && amIReceiver) return true;
                return false;
            });

            render(filtered);
        }

        function render(items) {
            const container = document.getElementById('notif-container');
            container.innerHTML = items.length === 0 ? '<p style="text-align:center;">لا توجد نتائج</p>' : '';
            
            items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(item => {
                const isDone = (item.done === true || item.done === "true" || item.done === "Null" ? false : item.done);
                const div = document.createElement('div');
                div.className = `notif-card ${isDone ? 'completed' : ''}`;
                div.innerHTML = `
                    <div class="note-content">${item.note || 'بدون نص'}</div>
                    <div class="meta">
                        <span>من: <b class="branch-tag">${item.branch}</b> إلى: <b class="branch-tag">${item.target_branch}</b></span>
                        <span style="color:#999;">${item.createdAt ? new Date(item.createdAt).toLocaleString('ar-EG') : ''}</span>
                    </div>
                    <div class="action-area">
                        <input type="text" id="input-${item.id}" class="comment-input" placeholder="التعليق..." value="${item.comment !== 'Null' && item.comment ? item.comment : ''}">
                        <button onclick="updateNotif('${item.id}', 'comment')" class="btn-primary" style="width:auto; padding:8px 15px; font-size:0.8em;">حفظ التعليق</button>
                        ${!isDone ? `<button onclick="updateNotif('${item.id}', 'done')" class="btn-success" style="width:auto; padding:8px 15px; font-size:0.8em; background:#28a745;">تم ✔️</button>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function updateNotif(id, actionType) {
            const commentVal = document.getElementById(`input-${id}`).value;
            const payload = {
                id: id,
                type: "notifications",
                action: "update",
                comment: commentVal,
                done: (actionType === 'done') // إذا ضغط "تم" يرسل true، وإذا "حفظ تعليق" يرسل الحالة الحالية
            };

            // نستخدم نفس الدالة التي نجحت في المشتريات
            const success = await updateData(payload); 
            if (success) {
                alert("تم التحديث بنجاح ✅");
                loadNotifications();
            } else {
                alert("حدث خطأ في التحديث ❌");
            }
        }
    </script>
</body>
</html>
