<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الإشعارات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html"><i class="fas fa-plus-circle"></i> مدخلات جديدة</a>
            <a href="purchases.html"><i class="fas fa-shopping-cart"></i> سجل المشتريات</a>
            <a href="transfers.html"><i class="fas fa-exchange-alt"></i> التحويلات</a>
            <a href="inventory.html"><i class="fas fa-clipboard-list"></i> الجرد</a> 
            <a href="notifications.html" class="active"><i class="fas fa-bell"></i> الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">🔔 ملاحظات وإشعارات الفروع</h2>
            
            <div class="filter-box">
                <span><i class="fas fa-filter"></i> تصفية:</span>
                <label><input type="checkbox" id="showReceived" checked onchange="applyFilter()"> واردة 📥</label>
                <label><input type="checkbox" id="showSent" onchange="applyFilter()"> مرسلة 📤</label>
                <label style="border-right: 2px solid #cbd5e0; padding-right: 15px; margin-right: 5px;">
                    <input type="checkbox" id="hideDone" checked onchange="applyFilter()"> قيد الانتظار فقط ⏳
                </label>
                <button onclick="loadNotifications()" class="btn-success" style="width:auto; margin-right:auto; padding:5px 20px;">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>

            <div id="notif-container">
                <p style="text-align:center;">جاري تحميل الإشعارات...</p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch') || activeUser || '';
        let allItems = [];

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadNotifications;
        }

        async function loadNotifications() {
            const container = document.getElementById('notif-container');
            container.innerHTML = '<p style="text-align:center;">⏳ جاري جلب البيانات من النظام...</p>';
            
            try {
                const response = await fetchFromN8N('notifications');
                if (Array.isArray(response)) {
                    allItems = (response[0] && response[0].data) ? response[0].data : response;
                } else {
                    allItems = response.data || [];
                }

                if (allItems.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#ff9800;">⚠️ لا توجد إشعارات حالياً</p>';
                } else {
                    applyFilter();
                }
            } catch (e) {
                container.innerHTML = '<p style="text-align:center; color:red;">❌ خطأ في الاتصال بالسيرفر</p>';
            }
        }

        function applyFilter() {
            const container = document.getElementById('notif-container');
            const sentChecked = document.getElementById('showSent').checked;
            const receivedChecked = document.getElementById('showReceived').checked;
            const hideDone = document.getElementById('hideDone').checked;

            const filtered = allItems.filter(item => {
                const sender = String(item.branch || '').trim();
                const receiver = String(item.target_branch || '').trim();
                const current = String(userBranch).trim();
                const isDone = (item.done === "تم" || item.done === true || item.done === "true");

                if (hideDone && isDone) return false;
                const isSent = (sender === current);
                const isReceived = (receiver === current);

                if (sentChecked && isSent) return true;
                if (receivedChecked && isReceived) return true;
                return false;
            });

            renderNotifications(filtered);
        }

        function renderNotifications(items) {
            const container = document.getElementById('notif-container');
            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">📭 لا يوجد نتائج تطابق بحثك</p>';
                return;
            }

            container.innerHTML = '';
            // الترتيب من الأقدم للأحدث (الأقدم فوق)
            items.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));

            items.forEach(item => {
                const isDone = (item.done === "تم" || item.done === true || item.done === "true");
                const div = document.createElement('div');
                div.className = `notif-card ${isDone ? 'completed' : ''}`;
                
                const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleString('ar-EG') : 'غير محدد';
                const commentValue = (item.comment && item.comment !== 'null') ? item.comment : '';

                div.innerHTML = `
                    <div style="font-weight:bold; font-size:1.1em; color:#2d3748; margin-bottom:8px;">📌 ${item.note || 'إشعار'}</div>
                    <div class="meta">
                        <span>من: <b class="branch-tag">${item.branch || '؟'}</b> ⬅️ إلى: <b class="branch-tag">${item.target_branch || '؟'}</b></span>
                        <span style="color:#718096; font-size:0.85em;"><i class="far fa-clock"></i> ${dateStr}</span>
                    </div>
                    <div class="action-area">
                        <input type="text" id="comm-${item.id}" class="comment-input" placeholder="أضف تعليقاً..." value="${commentValue}">
                        ${!isDone ? `<button onclick="handleDone(event, '${item.id}')" class="btn-done"><i class="fas fa-check"></i> تم</button>` : '<span style="color:#4a5568; font-weight:bold;"><i class="fas fa-check-double"></i> مكتمل</span>'}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function handleDone(event, id) {
            const btn = event.target;
            const comment = document.getElementById(`comm-${id}`).value;
            const updatePayload = { id, type: "إشعار", action: "update_status", comment, done: "تم", updatedAt: new Date().toISOString() };

            btn.innerText = "...";
            btn.disabled = true;

            try {
                if (await updateData(updatePayload)) {
                    await loadNotifications();
                } else throw new Error();
            } catch (error) {
                alert("❌ حدث خطأ في التحديث");
                btn.innerText = "تم";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
