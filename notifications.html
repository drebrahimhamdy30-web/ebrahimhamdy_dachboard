<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الإشعارات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notif-card {
            background: white; padding: 15px; margin-bottom: 12px;
            border-radius: 8px; border-right: 6px solid #28a745;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .notif-card.completed { border-right-color: #6c757d; opacity: 0.8; background: #f8f9fa; }
        .meta { font-size: 0.85em; color: #666; margin-top: 8px; border-top: 1px dotted #eee; padding-top: 8px; display: flex; justify-content: space-between; align-items: center; }
        .branch-tag { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .action-area { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
        .comment-input { flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .filter-box { display: flex; gap: 20px; background: #fffde7; padding: 15px; border-radius: 8px; border: 1px solid #fbc02d; margin-bottom: 15px; align-items: center; font-weight: bold; }
        .btn-primary { background: #1a73e8; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-primary:hover { background: #1557b0; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="inventory.html">📋 الجرد</a> 
            <a href="notifications.html" class="active">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">🔔 ملاحظات وإشعارات الفروع</h2>
            
            <div class="filter-box">
                <span>تصفية:</span>
                <label><input type="checkbox" id="showSent" checked onchange="applyFilter()"> طلباتي 📤</label>
                <label><input type="checkbox" id="showReceived" checked onchange="applyFilter()"> طلبات واردة 📥</label>
                <button onclick="loadNotifications()" class="btn-success" style="width:auto; margin-right:auto; padding:5px 20px;">تحديث 🔄</button>
            </div>

            <div id="notif-container">
                <p style="text-align:center;">جاري تحميل الإشعارات...</p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch') || '';
        let allItems = [];

        console.log("👤 المستخدم:", activeUser);
        console.log("🏢 الفرع:", userBranch);

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadNotifications;
        }

        async function loadNotifications() {
            const container = document.getElementById('notif-container');
            container.innerHTML = '<p style="text-align:center;">⏳ جاري تحميل البيانات من السيرفر...</p>';
            
            try {
                console.log("📡 بدء جلب البيانات من API...");
                const response = await fetchFromN8N('notifications');
                console.log("📥 البيانات المستقبلة الخام:", response);

                // معالجة البيانات بناءً على الهيكل المستقبل
                if (Array.isArray(response)) {
                    if (response.length > 0 && response[0].data && Array.isArray(response[0].data)) {
                        allItems = response[0].data;
                        console.log("✅ تم استخراج البيانات من response[0].data");
                    } else if (response.length > 0 && response[0].note) {
                        allItems = response;
                        console.log("✅ البيانات Array مباشر");
                    } else {
                        allItems = response;
                        console.log("⚠️ تم استلام Array بدون هيكل واضح");
                    }
                } else if (response && typeof response === 'object' && response.data) {
                    allItems = response.data;
                    console.log("✅ تم استخراج البيانات من response.data");
                } else {
                    allItems = [];
                    console.warn("❌ لم يتمكن من معالجة البيانات المستقبلة");
                }

                console.log(`📊 عدد الإشعارات المستقبلة: ${allItems.length}`);
                console.log("📋 محتويات البيانات:", allItems);

                if (allItems.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#ff9800;">⚠️ لا توجد إشعارات في النظام حالياً</p>';
                } else {
                    applyFilter();
                }
            } catch (e) {
                console.error("❌ خطأ في جلب البيانات:", e);
                container.innerHTML = '<p style="text-align:center; color:red;">❌ خطأ في تحميل البيانات: ' + e.message + '</p>';
            }
        }

        function applyFilter() {
            const container = document.getElementById('notif-container');
            const sentChecked = document.getElementById('showSent').checked;
            const receivedChecked = document.getElementById('showReceived').checked;

            console.log("🔍 تطبيق الفلتر - الفرع الحالي:", userBranch);
            console.log("✓ إظهار المرسلات:", sentChecked, "✓ إظهار المستقبلات:", receivedChecked);

            const filtered = allItems.filter(item => {
                const sender = String(item.branch || '').trim();
                const receiver = String(item.target_branch || '').trim();
                const current = String(userBranch).trim();

                const isSent = (sender === current);
                const isReceived = (receiver === current);

                // احترم اختيار المستخدم دائماً
                if (sentChecked && isSent) return true;
                if (receivedChecked && isReceived) return true;
                
                return false;
            });

            console.log(`✅ عدد النتائج بعد الفلترة: ${filtered.length}`);
            renderNotifications(filtered);
        }

        function renderNotifications(items) {
            const container = document.getElementById('notif-container');
            
            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">📭 لا توجد إشعارات تطابق معايير الفلترة</p>';
                return;
            }

            container.innerHTML = '';
            
            // ترتيب تنازلي حسب التاريخ
            items.sort((a, b) => {
                const dateA = new Date(a.createdAt || 0);
                const dateB = new Date(b.createdAt || 0);
                return dateB - dateA;
            });

            items.forEach(item => {
                const isDone = (item.done === true || item.done === "true" || item.done === "تم");
                const div = document.createElement('div');
                div.className = `notif-card ${isDone ? 'completed' : ''}`;
                
                const noteText = item.note || 'إشعار بدون نص';
                const branchFrom = item.branch || '؟';
                const branchTo = item.target_branch || '؟';
                const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleString('ar-EG') : '؟';
                const commentValue = (item.comment && item.comment !== 'Null' && item.comment !== 'null') ? item.comment : '';
                
                div.innerHTML = `
                    <div style="font-weight:bold; font-size:1.1em; margin-bottom:8px;">📌 ${noteText}</div>
                    <div class="meta">
                        <span>من: <b class="branch-tag">${branchFrom}</b> ⬅️ إلى: <b class="branch-tag">${branchTo}</b></span>
                        <span style="color:#888; font-size:0.9em;">📅 ${dateStr}</span>
                    </div>
                    <div class="action-area">
                        <input type="text" id="comm-${item.id}" class="comment-input" placeholder="أضف تعليقاً..." value="${commentValue}">
                        <button onclick="handleAction('${item.id}', 'comment')" class="btn-primary">💾 حفظ</button>
                        ${!isDone ? `<button onclick="handleAction('${item.id}', 'done')" class="btn-success" style="width:auto; padding:8px 15px;">✅ تم</button>` : '<span style="color:#999;">تم إنجازه ✓</span>'}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function handleAction(id, actionType) {
            const commentEl = document.getElementById(`comm-${id}`);
            if (!commentEl) {
                alert("❌ خطأ: لم يتم العثور على حقل التعليق");
                return;
            }

            const comment = commentEl.value;
            
            const updatePayload = {
                id: id,
                type: "notifications",
                action: "update_data",
                comment: comment,
                done: (actionType === 'done' ? true : false)
            };

            console.log("📤 إرسال البيانات:", updatePayload);
            const success = await updateData(updatePayload);
            
            if (success) {
                alert("✅ تم التحديث بنجاح!");
                loadNotifications();
            } else {
                alert("❌ فشل التحديث - تحقق من الاتصال");
            }
        }
    </script>
</body>
</html>
