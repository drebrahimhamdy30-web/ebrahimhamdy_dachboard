<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الإشعارات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notif-card {
            background: white; padding: 15px; margin-bottom: 12px;
            border-radius: 8px; border-right: 6px solid #28a745;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .notif-card:hover { transform: scale(1.01); }
        .notif-card.completed { border-right-color: #6c757d; opacity: 0.7; background: #f8f9fa; }
        .meta { font-size: 0.85em; color: #666; margin-top: 8px; border-top: 1px dotted #eee; padding-top: 5px; }
        .note-content { font-weight: bold; color: #333; font-size: 1.1em; }
        .branch-tag { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="inventory.html">📋 الجرد</a> 
            <a href="notifications.html" class="active">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">🔔 ملاحظات وإشعارات الفروع</h2>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <button onclick="loadNotifications()" class="btn-success" style="width: auto;">تحديث 🔄</button>
                <div id="branch-info" style="font-weight: bold; color: #155724;"></div>
            </div>

            <div id="notif-container">
                <p style="text-align:center;">جاري تحميل الإشعارات...</p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        // جلب فرع المستخدم الحالي من localStorage
        const userBranch = localStorage.getItem('userBranch') || 'الكل';

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            document.getElementById('branch-info').innerText = `فرع: ${userBranch}`;
            window.onload = loadNotifications;
        }

        async function loadNotifications() {
            const container = document.getElementById('notif-container');
            container.innerHTML = '<p style="text-align:center;">⏳ جاري فحص الإشعارات من n8n...</p>';

            try {
                // استدعاء الدالة من api.js وتمرير نوع 'notifications'
                const response = await fetchFromN8N('notifications');
                console.log("Notifications Raw Response:", response);

                // فك تغليف البيانات من n8n [0].data كما في صورة المشتريات السابقة
                let items = [];
                if (response && response[0] && response[0].data) {
                    items = response[0].data;
                } else if (Array.isArray(response)) {
                    items = response;
                }

                if (items.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#999;">لا توجد إشعارات مسجلة حالياً</p>';
                    return;
                }

                container.innerHTML = '';
                
                // ترتيب الإشعارات من الأحدث للأقدم
                items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                items.forEach(item => {
                    // منطق العرض: عرض الإشعارات الموجهة لفرعي أو التي أرسلها فرعي
                    const isForMe = (item.target_branch === userBranch || userBranch === 'الكل' || item.branch === userBranch);
                    
                    if (isForMe) {
                        const div = document.createElement('div');
                        // التأكد من حالة null في done من صورة الـ data table
                        const isDone = (item.done === true || item.done === "true");
                        
                        div.className = `notif-card ${isDone ? 'completed' : ''}`;
                        div.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items: flex-start;">
                                <div class="note-content">${item.note || 'بدون نص'}</div>
                                <span style="font-size: 1.2em;">${isDone ? '✅' : '⏳'}</span>
                            </div>
                            <div class="meta">
                                من: <span class="branch-tag">${item.branch || '-'}</span> 
                                إلى: <span class="branch-tag">${item.target_branch || '-'}</span>
                                <span style="float:left; color:#aaa; font-size:0.9em;">
                                    ${item.createdAt ? new Date(item.createdAt).toLocaleString('ar-EG') : ''}
                                </span>
                            </div>
                        `;
                        container.appendChild(div);
                    }
                });

                if (container.innerHTML === '') {
                    container.innerHTML = '<p style="text-align:center; color:#999;">لا توجد إشعارات موجهة لفرعك</p>';
                }

            } catch (error) {
                console.error("Notif Error:", error);
                container.innerHTML = '<p style="text-align:center; color:red;">خطأ في جلب الإشعارات</p>';
            }
        }
    </script>
</body>
</html>
