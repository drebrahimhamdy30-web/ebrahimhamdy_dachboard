<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الإشعارات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notif-card {
            background: white; padding: 15px; margin-bottom: 12px;
            border-radius: 8px; border-right: 6px solid #28a745;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .notif-card.completed { border-right-color: #6c757d; opacity: 0.7; }
        .meta { font-size: 0.8em; color: #666; margin-top: 5px; }
        .note-content { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="inventory.html">📋 الجرد</a> 
            <a href="notifications.html" class="active">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">🔔 ملاحظات وإشعارات الفروع</h2>
            <button onclick="loadNotifications()" class="btn-success" style="width: auto; margin-bottom: 15px;">تحديث 🔄</button>
            <div id="notif-container">
                <p style="text-align:center;">جاري تحميل الإشعارات...</p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch');

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadNotifications;
        }

        async function loadNotifications() {
            const container = document.getElementById('notif-container');
            const data = await fetchNotifications();

            if (!data || data.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">لا توجد إشعارات مسجلة</p>';
                return;
            }

            container.innerHTML = '';
            // عرض الإشعارات الموجهة لفرعي أو التي أرسلتها أنا
            data.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = `notif-card ${item.done ? 'completed' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <div class="note-content">${item.note || 'بدون نص'}</div>
                        <span>${item.done ? '✅' : '⏳'}</span>
                    </div>
                    <div class="meta">
                        من: <b>${item.branch}</b> | إلى: <b>${item.target_branch}</b>
                    </div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
