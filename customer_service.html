<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة طلباتي - خدمة العملاء</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; background: white; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #edf2f7; vertical-align: middle; }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 700; border-top: 2px solid #27ae60; }
        
        .type-badge { padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .type-purchase { background: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; }
        .type-transfer { background: #f3e5f5; color: #7b1fa2; border: 1px solid #e1bee7; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; display: inline-block; min-width: 100px; }
        .stat-ordered { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .stat-unavailable { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .stat-transferred { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        .current-branch-info { background: #e8f5e9; color: #2e7d32; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="nav-bar"></div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: #2c3e50;">
                    <i class="fas fa-tasks" style="color: #27ae60;"></i> متابعة حالة طلباتي
                </h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <span id="display-branch" class="current-branch-info"></span>
                    <button onclick="loadCSData()" style="background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                        <i class="fas fa-sync-alt"></i> تحديث
                    </button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="cs-table">
                    <thead>
                        <tr>
                            <th style="width: 8%;">النوع</th>
                            <th style="width: 25%;">الصنف</th>
                            <th style="width: 20%;">العميل</th>
                            <th style="width: 7%;">الكمية</th>
                            <th style="width: 15%;">جهة التوفير</th>
                            <th style="width: 15%;">الرد / الملاحظة</th>
                            <th style="width: 10%;">الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="7" style="text-align:center; padding: 40px; color: #94a3b8;">جاري تحميل بياناتك...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        const activeUser = checkAuth();
        // الحصول على اسم الفرع الحالي للمستخدم
        const userBranchName = localStorage.getItem('userBranch') || "غير محدد";
        
        if (activeUser) {
            document.getElementById('display-branch').innerText = "📍 فرع: " + userBranchName;
            window.onload = loadCSData;
        }

        async function loadCSData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 30px;">⏳ جاري جلب تحديثات طلباتك...</td></tr>';
            
            try {
                const response = await fetchOrders();
                let items = (response && response[0]?.data) ? response[0].data : (response.data || response);

                if (Array.isArray(items)) {
                    // الفلترة: 
                    // 1. يجب أن يكون الفرع الطالب (user) هو نفسه فرع المستخدم الحالي
                    // 2. الحالة ليست انتظار (ليست null أو فارغة أو pending)
                    const myRequests = items.filter(i => {
                        const isMyBranch = (String(i.user).trim() === String(userBranchName).trim());
                        const s = String(i.state || '').toLowerCase().trim();
                        const isResponded = (s !== 'pending' && s !== 'null' && s !== '' && s !== '-');
                        
                        return isMyBranch && isResponded;
                    });
                    
                    renderTable(myRequests);
                }
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#e74c3c; padding: 30px;">❌ خطأ في تحميل البيانات</td></tr>';
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            if (items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 40px; color: #94a3b8;">
                    <i class="fas fa-clipboard-check fa-2x" style="display:block; margin-bottom:10px; opacity:0.3;"></i> 
                    لا توجد ردود جديدة على طلبات فرع (${userBranchName}) حالياً.
                </td></tr>`;
                return;
            }

            tbody.innerHTML = items.map(i => {
                const isPurchase = String(i.type).includes("شراء");
                let statusText = '';
                let statusClass = '';

                const state = String(i.state).trim();
                if (state === 'ordered') { statusText = 'تم الطلب ✅'; statusClass = 'stat-ordered'; }
                else if (state === 'unavailable') { statusText = 'غير متوفر ❌'; statusClass = 'stat-unavailable'; }
                else if (state === 'transferred') { statusText = 'تم التحويل 🔄'; statusClass = 'stat-transferred'; }
                else { statusText = state; statusClass = 'stat-ordered'; }

                return `
                    <tr>
                        <td><span class="type-badge ${isPurchase ? 'type-purchase' : 'type-transfer'}">${isPurchase ? 'شراء' : 'تحويل'}</span></td>
                        <td style="text-align:right;">
                            <div style="font-weight:bold; color:#1e293b;">${i.item || i.item_name}</div>
                            <div style="font-size:0.75rem; color:#64748b;">${i.item_code || '---'}</div>
                        </td>
                        <td style="text-align:right;">
                            <div style="font-weight:600;">${i.cust_name || 'عميل عام'}</div>
                            <div style="font-size:0.75rem; color:#64748b;">${i.cust_code || '---'}</div>
                        </td>
                        <td style="font-weight:bold;">${i.qty || 1}</td>
                        <td><span style="font-size:0.85rem; color:#475569; font-weight:600;">${isPurchase ? 'المشتريات' : (i.branch || 'فرع آخر')}</span></td>
                        <td><i style="color:#64748b; font-size:0.85rem;">${i.company && i.company !== 'null' ? i.company : '---'}</i></td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
