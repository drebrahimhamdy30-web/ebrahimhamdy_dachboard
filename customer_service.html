<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة العملاء - اتخاذ إجراء</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-green: #27ae60; --primary-blue: #1a73e8; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; margin: 0; }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8fafc; padding: 12px; border-bottom: 2px solid var(--main-green); color: #64748b; font-size: 0.85rem; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        
        /* أزرار الإجراءات */
        .btn-action { background: var(--primary-blue); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .btn-action:hover { opacity: 0.9; }

        /* النافذة المنبثقة Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; width: 400px; margin: 15% auto; padding: 20px; border-radius: 12px; position: relative; }
        .modal-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; font-family: inherit; }
        .save-btn { width: 100%; padding: 12px; background: var(--main-green); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .branch-tag { background: var(--main-green); color: white; padding: 6px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-bar"></div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3><i class="fas fa-tasks"></i> إدارة طلبات فرع <span id="branch-display">...</span></h3>
                <button onclick="loadCSData()" class="btn-action" style="background:#64748b;"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>الصنف</th>
                            <th>العميل</th>
                            <th>الكمية</th>
                            <th>رد المشتريات</th>
                            <th>الحالة الحالية</th>
                            <th>إجراء خدمة العملاء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="6">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">تحديث حالة الطلب</div>
            <p id="item-info" style="font-size: 0.9rem; color: #666;"></p>
            <input type="hidden" id="selected-id">
            
            <label>اختر الإجراء المتخذ:</label>
            <select id="cs-decision">
                <option value="متوفر وتم ابلاغ العميل">متوفر وتم ابلاغ العميل ✅</option>
                <option value="غير متوفر يحتاج متابعة">غير متوفر يحتاج متابعة 🔍</option>
                <option value="إلغاء لعدم التوفر">إلغاء لعدم التوفر ❌</option>
            </select>
            
            <button class="save-btn" onclick="submitAction()">حفظ وإرسال التحديث</button>
            <button onclick="closeModal()" style="width:100%; margin-top:5px; background:none; border:none; color:red; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        const myBranch = (localStorage.getItem('userBranch') || "المعمورة").trim();
        document.getElementById('branch-display').innerText = myBranch;

        window.onload = loadCSData;

        async function loadCSData() {
            const tbody = document.getElementById('table-body');
            try {
                const response = await fetchOrders();
                let data = [];
                // معالجة هيكل البيانات كما فعلنا سابقاً
                if (Array.isArray(response)) data = response[0]?.data || response;
                else if (response?.data) data = response.data;

                // فلترة: طلبات فرعي + التي تم الرد عليها فقط (ليست pending)
                const filtered = data.filter(i => String(i.user).trim() === myBranch && i.state !== 'pending');

                tbody.innerHTML = filtered.map(i => `
                    <tr>
                        <td style="text-align:right;"><b>${i.item_name || i.item}</b></td>
                        <td>${i.cust_name || 'عميل عام'}</td>
                        <td>${i.qty || 1}</td>
                        <td><i style="color:#666">${i.company || '---'}</i></td>
                        <td><span style="color:var(--main-green); font-weight:bold;">${i.state}</span></td>
                        <td>
                            <button class="btn-action" onclick="openModal('${i.id}', '${i.item_name || i.item}')">
                                <i class="fas fa-edit"></i> إجراء
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { tbody.innerHTML = '<tr><td colspan="6">خطأ في التحميل</td></tr>'; }
        }

        // وظائف الـ Modal
        function openModal(id, itemName) {
            document.getElementById('selected-id').value = id;
            document.getElementById('item-info').innerText = "الصنف: " + itemName;
            document.getElementById('actionModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('actionModal').style.display = 'none';
        }

        async function submitAction() {
            const id = document.getElementById('selected-id').value;
            const decision = document.getElementById('cs-decision').value;
            
            const btn = document.querySelector('.save-btn');
            btn.innerText = "⏳ جاري التحديث...";
            btn.disabled = true;

            try {
                // نرسل الطلب لـ n8n (نفس رابط الـ Webhook ولكن بطريقة POST)
                const result = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        update_type: "cs_feedback",
                        row_id: id,
                        decision: decision,
                        branch: myBranch
                    })
                });

                if (result.ok) {
                    alert("تم تحديث الحالة بنجاح");
                    closeModal();
                    loadCSData(); // تحديث الجدول
                } else {
                    alert("فشل في تحديث البيانات");
                }
            } catch (error) {
                alert("خطأ في الاتصال بالسيرفر");
            } finally {
                btn.innerText = "حفظ وإرسال التحديث";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
