<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة العملاء - المعمورة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-green: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; margin: 0; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8fafc; padding: 12px; border-bottom: 2px solid var(--main-green); color: #64748b; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .badge-buy { background: #dbeafe; color: #1e40af; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .status-pill { padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .ordered { background: #dcfce7; color: #166534; }
        .pending { background: #f1f5f9; color: #64748b; }
        .branch-tag { background: var(--main-green); color: white; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-bar"></div>
    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3><i class="fas fa-headset"></i> متابعة ردود طلباتي</h3>
                <div>
                    <span id="branch-name" class="branch-tag">جاري التحميل...</span>
                    <button onclick="loadCSData()" style="padding: 6px 12px; cursor: pointer; margin-right: 10px;">تحديث</button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>النوع</th>
                            <th>الصنف</th>
                            <th>العميل</th>
                            <th>الكمية</th>
                            <th>الملاحظات</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        const myBranch = (localStorage.getItem('userBranch') || "المعمورة").trim();
        document.getElementById('branch-name').innerText = "فرع: " + myBranch;

        window.onload = loadCSData;

async function loadCSData() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '<tr><td colspan="6">⏳ جاري جلب الردود النهائية...</td></tr>';

    try {
        const response = await fetchOrders();
        let actualData = [];

        // فك تشفير الغلاف (نفس المنطق اللي شغال معاك حالياً)
        if (Array.isArray(response)) {
            if (response[0] && Array.isArray(response[0].data)) {
                actualData = response[0].data;
            } else {
                actualData = response;
            }
        } else if (response && Array.isArray(response.data)) {
            actualData = response.data;
        }

        // الفلترة: (شرط الفرع) + (شرط الحالة ليست انتظار)
        const respondedOrders = actualData.filter(item => {
            const userField = String(item.user || "").trim();
            const stateField = String(item.state || "").trim().toLowerCase();

            const isMyBranch = (userField === myBranch);
            
            // استبعاد أي طلب حالته pending أو فارغة أو null
            const hasFinalResponse = (
                stateField !== 'pending' && 
                stateField !== '' && 
                stateField !== 'null' && 
                stateField !== '-'
            );

            return isMyBranch && hasFinalResponse;
        });

        if (respondedOrders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="padding:40px; color:#94a3b8;">
                لا توجد ردود نهائية لفرع ${myBranch} حالياً.<br>
                <small>الطلبات التي لا تزال (Pending) يتم إخفاؤها تلقائياً.</small>
            </td></tr>`;
            return;
        }

        // ترتيب الأحدث أولاً
        respondedOrders.sort((a, b) => b.id - a.id);

        tbody.innerHTML = respondedOrders.map(i => {
            const isBuy = String(i.type).includes("شراء");
            const s = String(i.state || "").trim().toLowerCase();
            
            let sLabel = i.state;
            let sClass = 'ordered';

            if (s === 'ordered') { sLabel = 'تم الطلب ✅'; sClass = 'ordered'; }
            else if (s === 'unavailable') { sLabel = 'غير متوفر ❌'; sClass = 'unavailable'; }
            else if (s === 'transferred') { sLabel = 'تم التحويل 🔄'; sClass = 'transferred'; }

            return `
                <tr>
                    <td><span class="badge-buy">${isBuy ? 'شراء' : 'تحويل'}</span></td>
                    <td style="text-align:right;"><b>${i.item_name || i.item || '---'}</b></td>
                    <td>${i.cust_name || 'عميل عام'}</td>
                    <td><b>${i.qty || 1}</b></td>
                    <td>${i.company && i.company !== 'null' ? i.company : '---'}</td>
                    <td><span class="status-pill ${sClass}">${sLabel}</span></td>
                </tr>
            `;
        }).join('');

    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:red;">❌ فشل في تحديث البيانات</td></tr>';
    }
}

                myOrders.sort((a, b) => b.id - a.id);
                tbody.innerHTML = myOrders.map(i => `
                    <tr>
                        <td><span class="badge-buy">${i.type || 'شراء'}</span></td>
                        <td style="text-align:right;"><b>${i.item_name || i.item || '---'}</b></td>
                        <td>${i.cust_name || 'عميل عام'}</td>
                        <td>${i.qty || 1}</td>
                        <td>${i.company && i.company !== 'null' ? i.company : '---'}</td>
                        <td><span class="status-pill ${i.state === 'ordered' ? 'ordered' : 'pending'}">
                            ${i.state === 'ordered' ? 'تم الطلب ✅' : (i.state || 'إنتظار ⏳')}
                        </span></td>
                    </tr>
                `).join('');

            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" style="color:red;">❌ فشل في الاتصال بالبيانات</td></tr>';
            }
        }
    </script>
</body>
</html>
