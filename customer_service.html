<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة العملاء - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; background: white; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #edf2f7; }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 700; border-top: 2px solid #27ae60; }
        .type-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .type-purchase { background: #e3f2fd; color: #1976d2; }
        .type-transfer { background: #f3e5f5; color: #7b1fa2; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .stat-ordered { background: #d4edda; color: #155724; }
        .stat-unavailable { background: #f8d7da; color: #721c24; }
        .stat-transferred { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html"><i class="fas fa-plus"></i> مدخلات</a>
            <a href="purchases.html"><i class="fas fa-shopping-cart"></i> مشتريات</a>
            <a href="transfers.html"><i class="fas fa-exchange-alt"></i> تحويلات</a>
            <a href="customer_service.html" class="active"><i class="fas fa-headset"></i> خدمة العملاء</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> إشعارات</a> 
        </div>
        <div class="user-info" style="color: white; font-size: 0.8rem;">
            <span id="nav-user"></span>
            <button onclick="logout()" style="background:transparent; border:1px solid #fff; color:white; border-radius:4px; padding: 2px 8px;">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #2c3e50;"><i class="fas fa-headset"></i> متابعة طلبات العملاء (المنفذة والنواقص)</h3>
                <button onclick="loadCSData()" style="background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer;">
                    تحديث <i class="fas fa-sync"></i>
                </button>
            </div>

            <div style="overflow-x: auto;">
                <table id="cs-table">
                    <thead>
                        <tr>
                            <th>النوع</th>
                            <th>الفرع</th>
                            <th>الصنف</th>
                            <th>العميل</th>
                            <th>الكمية</th>
                            <th>المورد / الرد</th>
                            <th>الحالة النهائية</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="7" style="text-align:center; padding: 30px;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadCSData;
        }

        async function loadCSData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">⏳ جاري جلب البيانات...</td></tr>';
            
            try {
                const response = await fetchOrders();
                let items = (response && response[0]?.data) ? response[0].data : (response.data || response);

                if (Array.isArray(items)) {
                    // الفلترة: استبعاد "انتظار" وعرض المشتريات والتحويلات فقط
                    const filtered = items.filter(i => 
                        (i.state !== 'pending' && i.state !== '-' && i.state !== '') && 
                        (String(i.type).includes("شراء") || String(i.type).includes("تحويل"))
                    );
                    renderTable(filtered);
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">خطأ في الاتصال</td></tr>';
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">لا توجد طلبات منفذة حالياً</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(i => {
                const isPurchase = String(i.type).includes("شراء");
                let statusText = '';
                let statusClass = '';

                // توحيد مسميات الحالة للعرض
                if (i.state === 'ordered') { statusText = 'تم الطلب ✅'; statusClass = 'stat-ordered'; }
                else if (i.state === 'unavailable') { statusText = 'غير متوفر ❌'; statusClass = 'stat-unavailable'; }
                else if (i.state === 'transferred') { statusText = 'تم التحويل ✅'; statusClass = 'stat-transferred'; }
                else { statusText = i.state; statusClass = 'stat-ordered'; }

                return `
                    <tr>
                        <td><span class="type-badge ${isPurchase ? 'type-purchase' : 'type-transfer'}">${isPurchase ? 'شراء' : 'تحويل'}</span></td>
                        <td style="font-weight:600;">${i.branch || i.user || '-'}</td>
                        <td style="text-align:right;">
                            <div style="font-weight:bold;">${i.item || i.item_name}</div>
                            <div style="font-size:0.7rem; color:gray;">${i.item_code || ''}</div>
                        </td>
                        <td style="text-align:right;">
                            <div>${i.cust_name || 'عميل عام'}</div>
                            <div style="font-size:0.7rem; color:gray;">${i.cust_code || ''}</div>
                        </td>
                        <td style="font-weight:bold;">${i.qty || 1}</td>
                        <td><i style="color:#666;">${i.company || 'لا توجد ملاحظات'}</i></td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
