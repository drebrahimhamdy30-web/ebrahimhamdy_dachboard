<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة النواقص - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --warn-orange: #f39c12; --success-green: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; margin: 0; }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #fffaf0; padding: 12px; border-bottom: 2px solid var(--warn-orange); color: #7f8c8d; font-size: 0.85rem; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .shortage-tag { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; border: 1px solid #ffeeba; }
        
        .btn-update { 
            background: var(--success-green); 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            margin: auto;
        }
        .btn-update:hover { background: #219150; }
    </style>
</head>
<body>
    <div class="nav-bar"></div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: #2c3e50;">
                    <i class="fas fa-exclamation-triangle" style="color: var(--warn-orange);"></i> أصناف قيد المتابعة (النواقص)
                </h3>
                <button onclick="loadShortages()" class="btn-update" style="background: #3498db;">
                    <i class="fas fa-sync-alt"></i> تحديث القائمة
                </button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>الصنف</th>
                            <th>الفرع</th>
                            <th>اسم العميل</th>
                            <th>كود العميل</th>
                            <th>الحالة الحالية</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="shortage-list">
                        <tr><td colspan="6" style="padding:40px; color:#94a3b8;">جاري فحص النواقص...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        const activeUser = checkAuth();
        
        if (activeUser) { window.onload = loadShortages; }

        async function loadShortages() {
            const tbody = document.getElementById('shortage-list');
            try {
                const response = await fetchOrders(); 
                const allItems = (response[0]?.data) ? response[0].data : (response.data || response);
                
                // فلترة الأصناف التي حالتها "غير متوفر يحتاج متابعة" فقط
                const shortages = allItems.filter(item => 
                    String(item.cust_state).trim() === "غير متوفر يحتاج متابعة"
                );

                renderShortages(shortages);
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" style="color:red;">❌ خطأ في تحميل البيانات</td></tr>';
            }
        }

        function renderShortages(items) {
            const tbody = document.getElementById('shortage-list');
            
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="padding:40px; color:#27ae60; font-weight:bold;">✅ لا توجد أصناف تحتاج متابعة حالياً</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(item => `
                <tr>
                    <td style="text-align:right;"><b>${item.item_name || item.item || '---'}</b></td>
                    <td><span class="branch-tag">${item.user}</span></td>
                    <td>${item.cust_name || '---'}</td>
                    <td><code>${item.cust_code || '---'}</code></td>
                    <td><span class="shortage-tag">قيد المتابعة 🔍</span></td>
                    <td>
                        <button onclick="markAsAvailable(event, '${item.id}')" class="btn-update">
                            <i class="fas fa-check"></i> توفر الآن
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function markAsAvailable(event, id) {
            const btn = event.target.closest('button');
            if(!confirm("هل تأكدت من توفر الصنف وإبلاغ العميل؟")) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحديث...';

            // إرسال تحديث لـ n8n لتغيير الحالة في جوجل شيت
            const success = await updateData({
                id: id,
                type: "cs_action",
                decision: "متوفر وتم ابلاغ العميل", // نغير الحالة للنهائية
                updatedAt: new Date().toISOString()
            });

            if (success) {
                // إزالة السطر من الشاشة فوراً
                loadShortages(); 
            } else {
                alert("⚠️ حدث خطأ أثناء التحديث");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> توفر الآن';
            }
        }
    </script>
</body>
</html>
