<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة النواقص - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --warn-orange: #f39c12; --success-green: #27ae60; --primary-blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; margin: 0; }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #fffaf0; padding: 12px; border-bottom: 2px solid var(--warn-orange); color: #7f8c8d; font-size: 0.85rem; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .shortage-tag { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; border: 1px solid #ffeeba; }
        .branch-tag { background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }

        .btn-update { 
            background: var(--success-green); 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            margin: auto;
            transition: 0.3s;
        }
        .btn-update:hover { background: #219150; transform: scale(1.02); }
        .btn-refresh { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav-bar"></div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: #2c3e50;">
                    <i class="fas fa-exclamation-triangle" style="color: var(--warn-orange);"></i> 
                    متابعة نواقص فرع: <span id="current-branch-name" style="color: var(--primary-blue);">...</span>
                </h3>
                <button onclick="loadShortages()" class="btn-refresh">
                    <i class="fas fa-sync-alt"></i> تحديث القائمة
                </button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 25%;">الصنف</th>
                            <th style="width: 10%;">الفرع</th>
                            <th style="width: 20%;">اسم العميل</th>
                            <th style="width: 15%;">كود العميل</th>
                            <th style="width: 15%;">الحالة الحالية</th>
                            <th style="width: 15%;">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="shortage-list">
                        <tr><td colspan="6" style="padding:40px; color:#94a3b8;">جاري فحص النواقص...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        // 1. التحقق من الهوية (الحل اللي استخدمناه قبل كدة لضمان وجود الفرع)
        const activeUser = checkAuth();
        // نسحب userBranch ولو مش موجود ناخد activeUser كاحتياطي
        const userBranch = (localStorage.getItem('userBranch') || localStorage.getItem('activeUser') || "عام").trim();
        
        document.getElementById('current-branch-name').innerText = userBranch;
        
        if (activeUser) { 
            window.onload = loadShortages; 
        }

async function loadShortages() {
            const tbody = document.getElementById('shortage-list');
            const userBranch = (localStorage.getItem('userBranch') || localStorage.getItem('activeUser') || "عام").trim();
            
            try {
                const response = await fetchOrders(); 
                const allItems = (response[0]?.data) ? response[0].data : (response.data || response);
                
                const shortages = allItems.filter(item => {
                    // 1. تطهير البيانات وتجهيز المتغيرات
                    const itemState = String(item.cust_state || "").trim();
                    const itemBranch = String(item.user || "").trim();
                    const currentSessionBranch = userBranch.trim();
                    
                    // تحويل الرصيد لرقم (لو null أو غير موجود يعتبر صفر)
                    const stockQuantity = parseFloat(item.stq) || 0;

                    // 2. تطبيق الشروط:
                    // أ- يجب أن تكون الحالة "يحتاج متابعة"
                    const needsFollowUp = itemState === "غير متوفر يحتاج متابعة";
                    
                    // ب- شرط الرصيد الجديد (يظهر فقط لو الرصيد أكبر من صفر)
                    const isNowAvailable = stockQuantity > 0;

                    // ج- شرط الفرع (لو المستخدم "عام" يرى الكل، لو فرع محدد يرى نواقصه فقط)
                    let isVisibleForBranch = false;
                    if (currentSessionBranch === "عام" || currentSessionBranch === "Admin") {
                        isVisibleForBranch = true;
                    } else {
                        isVisibleForBranch = (itemBranch === currentSessionBranch);
                    }

                    // النتيجة النهائية: متابعة + رصيد > 0 + تبعية الفرع
                    return needsFollowUp && isNowAvailable && isVisibleForBranch;
                });

                renderShortages(shortages);
            } catch (e) {
                console.error("Error loading shortages:", e);
                tbody.innerHTML = '<tr><td colspan="6" style="color:red; padding:20px;">❌ فشل تحميل البيانات</td></tr>';
            }
        }

        function renderShortages(items) {
            const tbody = document.getElementById('shortage-list');
            
            if (items.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="padding:50px; color:#64748b;">
                            <i class="fas fa-check-double" style="font-size: 2rem; color: var(--success-green); display: block; margin-bottom: 10px;"></i>
                            لا توجد نواقص معلقة حالياً لـ (${userBranch})
                        </td>
                    </tr>`;
                return;
            }

            tbody.innerHTML = items.map(item => `
                <tr>
                    <td style="text-align:right;"><b>${item.item_name || item.item || '---'}</b></td>
                    <td><span class="branch-tag">${item.user}</span></td>
                    <td>${item.cust_name || '---'}</td>
                    <td><code>${item.cust_code || '---'}</code></td>
                    <td><span class="shortage-tag">قيد المتابعة 🔍</span></td>
                    <td>
                        <button onclick="markAsAvailable(event, '${item.id}')" class="btn-update">
                            <i class="fas fa-check"></i> توفر وتم الإبلاغ
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function markAsAvailable(event, id) {
            const btn = event.target.closest('button');
            if(!confirm("هل تأكدت من توفر الصنف وإبلاغ العميل فعلياً؟")) return;

            btn.disabled = true;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

            const success = await updateData({
                id: id,
                type: "cs_action",
                decision: "متوفر وتم ابلاغ العميل",
                done: "تم",
                updatedAt: new Date().toISOString()
            });

            if (success) {
                loadShortages(); 
            } else {
                alert("⚠️ فشل التحديث، حاول مرة أخرى");
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }
    </script>
</body>
</html>
