<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة النواقص - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --warn-orange: #f39c12; --success-green: #27ae60; --primary-blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; margin: 0; }
        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #fffaf0; padding: 12px; border-bottom: 2px solid var(--warn-orange); color: #7f8c8d; font-size: 0.85rem; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .shortage-tag { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; border: 1px solid #ffeeba; }
        .completed-tag { background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; border: 1px solid #c3e6cb; }
        .branch-tag { background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }

        .btn-update { 
            background: var(--success-green); 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            margin: auto;
            transition: 0.3s;
        }
        .btn-update:hover { background: #219150; transform: scale(1.02); }
        .btn-refresh { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        
        .date-cell { font-size: 0.8rem; color: #64748b; direction: ltr; }

        /* تنسيق الـ Checkbox الجديد */
        .show-completed-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            font-size: 0.85rem;
            color: #475569;
        }
        .show-completed-container input { cursor: pointer; width: 16px; height: 16px; }
        
        /* تظليل الصفوف المكتملة */
        .row-completed { background-color: #fcfdfd; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="nav-bar"></div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <h3 style="margin: 0; color: #2c3e50;">
                    <i class="fas fa-exclamation-triangle" style="color: var(--warn-orange);"></i> 
                    متابعة نواقص فرع: <span id="current-branch-name" style="color: var(--primary-blue);">...</span>
                </h3>
                
                <div style="display: flex; gap: 15px; align-items: center;">
                    <label class="show-completed-container">
                        <input type="checkbox" id="show-completed-toggle" onchange="loadShortages()">
                        عرض العمليات المكتملة
                    </label>

                    <button onclick="loadShortages()" class="btn-refresh">
                        <i class="fas fa-sync-alt"></i> تحديث القائمة
                    </button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 15%;">تاريخ الطلب</th>
                            <th style="width: 25%;">الصنف</th>
                            <th style="width: 10%;">الفرع</th>
                            <th style="width: 15%;">اسم العميل</th>
                            <th style="width: 10%;">كود العميل</th>
                            <th style="width: 12%;">الحالة</th>
                            <th style="width: 13%;">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="shortage-list">
                        <tr><td colspan="7" style="padding:40px; color:#94a3b8;">جاري فحص النواقص...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = (localStorage.getItem('userBranch') || localStorage.getItem('activeUser') || "عام").trim();
        
        document.getElementById('current-branch-name').innerText = userBranch;
        
        if (activeUser) { 
            window.onload = loadShortages; 
        }

        async function loadShortages() {
            const tbody = document.getElementById('shortage-list');
            const showCompleted = document.getElementById('show-completed-toggle').checked;
            const currentSessionBranch = (localStorage.getItem('userBranch') || localStorage.getItem('activeUser') || "عام").trim();
            
            try {
                const response = await fetchOrders(); 
                const allItems = (response[0]?.data) ? response[0].data : (response.data || response);
                
                const shortages = allItems.filter(item => {
                    const itemState = String(item.cust_state || "").trim();
                    const itemDecision = String(item.decision || "").trim();
                    const itemBranch = String(item.user || "").trim();
                    const stockQuantity = parseFloat(item.stq) || 0;

                    // الحالات المطلوبة
                    const isPendingShortage = (itemState === "غير متوفر يحتاج متابعة" && stockQuantity > 0 && itemDecision !== "متوفر وتم ابلاغ العميل");
                    const isCompletedShortage = (itemDecision === "متوفر وتم ابلاغ العميل");

                    // فلترة الفرع
                    let isVisibleForBranch = (currentSessionBranch === "عام" || currentSessionBranch === "Admin" || itemBranch === currentSessionBranch);

                    if (!isVisibleForBranch) return false;

                    // المنطق الجديد للفلتر:
                    if (showCompleted) {
                        return isPendingShortage || isCompletedShortage;
                    } else {
                        return isPendingShortage;
                    }
                });

                renderShortages(shortages);
            } catch (e) {
                console.error("Error loading shortages:", e);
                tbody.innerHTML = '<tr><td colspan="7" style="color:red; padding:20px;">❌ فشل تحميل البيانات</td></tr>';
            }
        }

        function renderShortages(items) {
            const tbody = document.getElementById('shortage-list');
            
            if (items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="padding:50px; color:#64748b;">لا توجد بيانات للعرض</td></tr>`;
                return;
            }

            // ترتيب النواقص المعلقة أولاً ثم المكتملة
            items.sort((a, b) => {
                if (a.decision === "متوفر وتم ابلاغ العميل" && b.decision !== "متوفر وتم ابلاغ العميل") return 1;
                if (a.decision !== "متوفر وتم ابلاغ العميل" && b.decision === "متوفر وتم ابلاغ العميل") return -1;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            tbody.innerHTML = items.map(item => {
                const isDone = (item.decision === "متوفر وتم ابلاغ العميل");
                let displayDate = "---";
                if (item.createdAt) {
                    const dateObj = new Date(item.createdAt);
                    displayDate = dateObj.toLocaleDateString('ar-EG', { month: 'numeric', day: 'numeric' }) + 
                                  " " + 
                                  dateObj.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: true });
                }

                return `
                    <tr class="${isDone ? 'row-completed' : ''}">
                        <td class="date-cell">${displayDate}</td>
                        <td style="text-align:right;"><b>${item.item_name || item.item || '---'}</b></td>
                        <td><span class="branch-tag">${item.user}</span></td>
                        <td>${item.cust_name || '---'}</td>
                        <td><code>${item.cust_code || '---'}</code></td>
                        <td>
                            ${isDone ? 
                                '<span class="completed-tag"><i class="fas fa-check-circle"></i> مكتمل</span>' : 
                                '<span class="shortage-tag">قيد المتابعة 🔍</span>'}
                        </td>
                        <td>
                            ${isDone ? 
                                '<span style="color:#27ae60; font-size:0.8rem;">تم الإبلاغ بنجاح</span>' : 
                                `<button onclick="markAsAvailable(event, '${item.id}')" class="btn-update">
                                    <i class="fas fa-check"></i> توفر وتم الإبلاغ
                                </button>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function markAsAvailable(event, id) {
            const btn = event.target.closest('button');
            if(!confirm("هل تأكدت من توفر الصنف وإبلاغ العميل فعلياً؟")) return;

            btn.disabled = true;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';

            const success = await updateData({
                id: id,
                type: "cs_action",
                decision: "متوفر وتم ابلاغ العميل",
                done: "تم",
                updatedAt: new Date().toISOString()
            });

            if (success) {
                loadShortages(); 
            } else {
                alert("⚠️ فشل التحديث، حاول مرة أخرى");
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }
    </script>
</body>
</html>
