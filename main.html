<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب جديد - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden { display: none !important; }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html" id="link-main" class="active">➕ مدخلات جديدة</a>
            <a href="purchases.html" id="link-purchases">🛒 سجل المشتريات</a>
            <a href="transfers.html" id="link-transfers">🔄 التحويلات</a>
            <a href="inventory.html" id="link-inventory">📋 الجرد</a> 
            <a href="notifications.html" id="link-notifications">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">أضف طلب جديد للفرع</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>نوع العملية</label>
                    <select id="type" onchange="handleTypeChange()" required>
                        <option value="شراء">طلب شراء (نقص)</option>
                        <option value="تحويل">تحويل بين الفروع</option>
                        <option value="جرد">جرد</option>
                        <option value="إشعار">إشعار</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="branch-label">توجيه إلى فرع</label>
                    <select id="branch" required>
                        <option value="المعمورة">المعمورة</option>
                        <option value="سان ستيفانو">سان ستيفانو</option>
                        <option value="سيدى بشر">سيدى بشر</option>
                    </select>
                </div>

                <hr id="divider">

                <div id="item-section">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>كود الصنف</label>
                            <input type="text" id="item_code" placeholder="اختياري">
                        </div>
                        <div class="form-group" style="flex: 2;" id="item-name-div">
                            <label>اسم الصنف</label>
                            <input type="text" id="item_name" placeholder="اسم المنتج">
                        </div>
                    </div>
                </div>

                <div id="extra-section">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>كود العميل</label>
                            <input type="text" id="customer_code" placeholder="اختياري">
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label>اسم العميل</label>
                            <input type="text" id="customer_name" placeholder="اسم العميل">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>الكمية المطلوبة</label>
                        <input type="number" id="qty" placeholder="0">
                    </div>
                </div>

                <div id="note-section" class="hidden">
                    <div class="form-group">
                        <label>نص الإشعار / الملاحظة</label>
                        <textarea id="note_text" rows="4" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;" placeholder="اكتب تفاصيل الإشعار هنا..."></textarea>
                    </div>
                </div>

                <button type="button" id="submitBtn" class="btn btn-success" style="width: 100%; margin-top: 15px;" onclick="submitOrder()">
                    إرسال الآن
                </button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = localStorage.getItem('activeUser');
        const userBranch = localStorage.getItem('userBranch');

        if (activeUser) {
            document.getElementById('nav-user').innerText = `${activeUser} (${userBranch})`;
            handleTypeChange(); 
        }

        function handleTypeChange() {
            const type = document.getElementById('type').value;
            const branchSelect = document.getElementById('branch');
            const itemSection = document.getElementById('item-section');
            const itemNameDiv = document.getElementById('item-name-div');
            const extraSection = document.getElementById('extra-section');
            const noteSection = document.getElementById('note-section');

            if (userBranch) {
                branchSelect.value = userBranch;
            }

            if (type === "جرد") {
                itemSection.classList.remove('hidden');
                itemNameDiv.classList.add('hidden');
                extraSection.classList.add('hidden');
                noteSection.classList.add('hidden');
                branchSelect.disabled = false; 
            } 
            else if (type === "إشعار") {
                itemSection.classList.add('hidden');
                extraSection.classList.add('hidden');
                noteSection.classList.remove('hidden');
                branchSelect.disabled = false;
            }
            else if (type === "شراء") {
                itemSection.classList.remove('hidden');
                itemNameDiv.classList.remove('hidden');
                extraSection.classList.remove('hidden');
                noteSection.classList.add('hidden');
                branchSelect.disabled = true; 
            }
            else { // تحويل
                itemSection.classList.remove('hidden');
                itemNameDiv.classList.remove('hidden');
                extraSection.classList.remove('hidden');
                noteSection.classList.add('hidden');
                branchSelect.disabled = false;
            }
        }

        async function submitOrder() {
            const user = localStorage.getItem('activeUser');
            if (!user) return;

            const btn = document.getElementById('submitBtn');
            const type = document.getElementById('type').value;

            const formData = {
                user: user,
                type: type,
                branch: document.getElementById('branch').value,
                item_code: document.getElementById('item_code').value,
                item: type === "إشعار" ? "إشعار عام" : document.getElementById('item_name').value,
                customer_code: document.getElementById('customer_code').value,
                customer_name: document.getElementById('customer_name').value,
                qty: document.getElementById('qty').value || 0,
                company: type === "إشعار" ? document.getElementById('note_text').value : "", 
                state: 'pending',
                createdAt: new Date().toISOString()
            };

            try {
                btn.disabled = true;
                btn.innerText = "⏳ جاري الإرسال...";
                
                const success = await postData(formData);
                
                if (success) {
                    alert("تم الإرسال بنجاح ✅");
                    document.getElementById('orderForm').reset();
                    handleTypeChange(); // لإعادة ضبط الحقول المخفية والظاهرة والفرع الافتراضي
                } else {
                    alert("فشل الإرسال ❌");
                }
            } catch (error) {
                alert("حدث خطأ في الاتصال");
            } finally {
                btn.disabled = false;
                btn.innerText = "إرسال الآن";
            }
        }
    </script>
</body>
</html>
