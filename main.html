<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الصيدلية المتكامل</title>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --bg: #f8f9fa; --dark: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        
        /* القائمة العلوية (Tabs) */
        .navbar { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #666; font-weight: bold; border-bottom: 3px solid transparent; transition: 0.3s; }
        .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f0f7ff; }
        .nav-item:hover { background: #f9f9f9; }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; } /* إخفاء الصفحات افتراضياً */
        .page.active { display: block; } /* إظهار الصفحة النشطة */

        /* التنسيقات العامة */
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--dark); margin-top: 0; border-right: 4px solid var(--primary); padding-right: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { background: #f1f3f4; padding: 12px; text-align: right; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; color: white; font-weight: bold; }
        .bg-blue { background: #007bff; } .bg-orange { background: #fd7e14; } .bg-green { background: #28a745; }
        
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-send { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .header-info { text-align: left; padding: 10px; font-size: 0.9rem; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header-info">مرحباً: <span id="userName">...</span> | <a href="#" onclick="logout()" style="color:red">خروج</a></div>

    <div class="navbar">
        <div class="nav-item active" onclick="showPage('addOrderPage', this)">إضافة طلب</div>
        <div class="nav-item" onclick="showPage('purchasePage', this)">المشتريات</div>
        <div class="nav-item" onclick="showPage('transferPage', this)">التحويلات</div>
        <div class="nav-item" onclick="showPage('inventoryPage', this)">الجرد</div>
    </div>

    <div class="container">
        
        <div id="addOrderPage" class="page active">
            <div class="card">
                <h2>نموذج إدخال طلب جديد</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label>نوع الطلب</label>
                        <select id="orderType" onchange="updateFormFields()">
                            <option value="شراء">شراء</option>
                            <option value="تحويل">تحويل</option>
                            <option value="جرد">جرد</option>
                        </select>
                    </div>
                    <div>
                        <label>الفرع</label>
                        <select id="branch">
                            <option>المعمورة</option>
                            <option>سان ستيفانو</option>
                            <option>سيدى بشر</option>
                        </select>
                    </div>
                </div>
                <div id="itemContainer">
                    <label>المنتج</label>
                    <input type="text" id="itemName" placeholder="اسم المنتج أو الكود">
                    <label>الكمية / التفاصيل</label>
                    <input type="text" id="itemDetails">
                </div>
                <button class="btn-send" onclick="submitOrder()">إرسال الطلب</button>
            </div>
        </div>

        <div id="purchasePage" class="page">
            <div class="card">
                <h2>سجل المشتريات</h2>
                <table id="purchaseTable">
                    <thead><tr><th>التاريخ</th><th>الفرع</th><th>المنتج</th><th>بواسطة</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="transferPage" class="page">
            <div class="card">
                <h2>سجل التحويلات بين الفروع</h2>
                <table id="transferTable">
                    <thead><tr><th>التاريخ</th><th>من فرع</th><th>المنتج</th><th>الحالة</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="inventoryPage" class="page">
            <div class="card">
                <h2>سجل عمليات الجرد</h2>
                <table id="inventoryTable">
                    <thead><tr><th>التاريخ</th><th>الفرع</th><th>المنتج</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // التحقق من الدخول
        const user = localStorage.getItem('activeUser');
        if(!user) window.location.href = 'index.html';
        document.getElementById('userName').innerText = user;

        // وظيفة التبديل بين الصفحات
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');

            // عند فتح صفحة معينة، يمكننا جلب بياناتها فقط من n8n
            if(pageId !== 'addOrderPage') {
                loadDataFromN8N(pageId);
            }
        }

        async function loadDataFromN8N(pageType) {
            console.log("جاري جلب بيانات: " + pageType);
            // هنا تضع رابط الويبهوك (GET) الذي يسحب من جوجل شيت
            // وتقوم بتصفية البيانات حسب النوع وتعبئة الجدول المناسب
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
