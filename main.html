<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب جديد - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="user-info">المستخدم: <span id="displayUser">...</span></div>
        <div class="logo"><b>نظام تسجيل الطلبات</b></div>
        <button class="btn btn-danger" onclick="logout()">خروج</button>
    </header>

    <nav class="nav-menu">
        <a href="main.html" class="nav-link active">إضافة طلب</a>
        <a href="purchases.html" class="nav-link">المشتريات</a>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: auto;">
            <h2>أضف طلب جديد للفرع</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>نوع الطلب</label>
                    <select id="type" required>
                        <option value="شراء">طلب شراء (نقص)</option>
                        <option value="تحويل">تحويل بين الفروع</option>
                        <option value="جرد">إشعار جرد</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>الفرع المستهدف</label>
                    <select id="branch" required>
                        <option>فرع المعمورة</option>
                        <option>فرع سان ستيفانو</option>
                        <option>فرع سيدى بشر</option>
                    </nav>
                </div>

                <div class="form-group">
                    <label>اسم المنتج / الكود</label>
                    <input type="text" id="item" placeholder="مثلاً: بانتوجار كبسول" required>
                </div>

                <div class="form-group">
                    <label>الكمية المطلوبة</label>
                    <input type="number" id="qty" placeholder="0" required>
                </div>

                <button type="button" id="submitBtn" class="btn btn-success" style="width: 100%;" onclick="submitOrder()">
                    إرسال الطلب الآن
                </button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // التأكد من الهوية فور التحميل
        const user = checkAuth();
        document.getElementById('displayUser').innerText = user;

async function submitOrder() {
    const user = checkAuth();
    const btn = document.getElementById('submitBtn');
    const formData = {
        user: user,
        type: document.getElementById('type').value,
        branch: document.getElementById('branch').value,
        item: document.getElementById('item').value,
        qty: document.getElementById('qty').value,
        status: '',   // حقل فارغ للطلب الجديد
        company: '',  // حقل فارغ للطلب الجديد
        createdAt: new Date().toISOString()
    };

    try {
        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";
        await postData(formData);
        alert("تم إرسال الطلب بنجاح");
        document.getElementById('orderForm').reset();
    } catch (error) {
        alert("خطأ في الإرسال");
    } finally {
        btn.disabled = false;
        btn.innerText = "إرسال الطلب الآن";
    }
}

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
