<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب جديد - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html" id="link-main" class="active">➕ مدخلات جديدة</a>
            <a href="purchases.html" id="link-purchases">🛒 سجل المشتريات</a>
            <a href="transfers.html" id="link-transfers">🔄 التحويلات</a>
            <a href="notifications.html" id="link-notifications">🔔 الإشعارات</a>
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: auto;">
            <h2 style="text-align: center; margin-bottom: 20px;">أضف طلب جديد للفرع</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>نوع الطلب</label>
                    <select id="type" onchange="toggleBranchLock()" required>
                        <option value="شراء">طلب شراء (نقص)</option>
                        <option value="تحويل">تحويل بين الفروع</option>
                        <option value="جرد">إشعار جرد</option>
                    </select>
                </div>

                <div class="form-group">
                    <label> طلب من فرع </label>
                    <select id="branch" required>
                        <option value="المعمورة">المعمورة</option>
                        <option value="سان ستيفانو">سان ستيفانو</option>
                        <option value="سيدى بشر">سيدى بشر</option>
                    </select>
                </div>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>كود الصنف</label>
                        <input type="text" id="item_code" placeholder="اختياري">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>اسم الصنف</label>
                        <input type="text" id="item_name" placeholder="اسم المنتج" required>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>كود العميل</label>
                        <input type="text" id="customer_code" placeholder="اختياري">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>اسم العميل</label>
                        <input type="text" id="customer_name" placeholder="اسم العميل">
                    </div>
                </div>

                <div class="form-group">
                    <label>الكمية المطلوبة</label>
                    <input type="number" id="qty" placeholder="0" required>
                </div>

                <button type="button" id="submitBtn" class="btn btn-success" style="width: 100%; margin-top: 15px;" onclick="submitOrder()">
                    إرسال الطلب الآن
                </button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch');

        if (activeUser) {
            document.getElementById('nav-user').innerText = `${activeUser} (${userBranch})`;
            toggleBranchLock();
        }

        function toggleBranchLock() {
            const typeSelect = document.getElementById('type');
            const branchSelect = document.getElementById('branch');
            
            if (typeSelect.value === "شراء") {
                if (userBranch) {
                    // مطابقة دقيقة لاسم الفرع المخزن في المتصفح مع خيارات القائمة
                    for (let option of branchSelect.options) {
                        if (option.value === userBranch) {
                            option.selected = true;
                            break;
                        }
                    }
                }
                branchSelect.disabled = true;
            } else {
                branchSelect.disabled = false;
            }
        }

        async function submitOrder() {
            const user = checkAuth();
            if (!user) return;

            const btn = document.getElementById('submitBtn');
            const branchSelect = document.getElementById('branch');
            
            const formData = {
                user: user,
                type: document.getElementById('type').value,
                branch: branchSelect.value, 
                item_code: document.getElementById('item_code').value,
                item: document.getElementById('item_name').value, 
                customer_code: document.getElementById('customer_code').value,
                customer_name: document.getElementById('customer_name').value,
                qty: document.getElementById('qty').value,
                state: 'pending',
                createdAt: new Date().toISOString()
            };

            try {
                btn.disabled = true;
                btn.innerText = "⏳ جاري الإرسال...";
                
                const success = await postData(formData);
                
                if (success) {
                    alert("تم إرسال الطلب بنجاح ✅");
                    document.getElementById('orderForm').reset();
                    toggleBranchLock(); 
                } else {
                    alert("فشل الإرسال ❌");
                }
            } catch (error) {
                alert("حدث خطأ في الاتصال");
            } finally {
                btn.disabled = false;
                btn.innerText = "إرسال الطلب الآن";
            }
        }
    </script>
</body>
</html>
