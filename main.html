<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب جديد - صيدلية د. إبراهيم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        select, input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit;
        }
        .hidden { display: none; }
        #send-btn { 
            background-color: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
        }
        #send-btn:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html" class="active">➕ مدخلات جديدة</a>
            <a href="purchases.html">🛒 المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="inventory.html">📋 الجرد</a> 
            <a href="notifications.html">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2 style="text-align: center; margin-bottom: 25px;">أضف طلب جديد للفرع</h2>
            
            <div class="form-group">
                <label>نوع العملية</label>
                <select id="type" onchange="toggleFields()">
                    <option value="شراء">شراء (نواقص)</option>
                    <option value="تحويل">تحويل (بين الفروع)</option>
                    <option value="جرد">جرد</option>
                    <option value="إشعار">إشعار</option>
                </select>
            </div>

            <div class="form-group">
                <label id="target-label">توجيه إلى فرع</label>
                <select id="target_branch">
                    <option value="سان ستيفانو">سان ستيفانو</option>
                    <option value="المعمورة">المعمورة</option>
                    <option value="السيوف">السيوف</option>
                </select>
            </div>

            <div id="product-fields">
                <div class="form-group">
                    <label>اسم الصنف</label>
                    <input type="text" id="item_name" placeholder="اكتب اسم الدواء هنا...">
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" id="qty" value="1">
                </div>
            </div>

            <div id="note-fields" class="hidden">
                <div class="form-group">
                    <label>نص الإشعار / الملاحظة</label>
                    <textarea id="note_text" rows="4" placeholder="اكتب تفاصيل الإشعار هنا..."></textarea>
                </div>
            </div>

            <button id="send-btn" onclick="sendData()">إرسال الآن</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch') || "غير محدد";

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
        }

        // التحكم في ظهور الحقول بناءً على الاختيار
        function toggleFields() {
            const type = document.getElementById('type').value;
            const productFields = document.getElementById('product-fields');
            const noteFields = document.getElementById('note-fields');
            const targetLabel = document.getElementById('target-label');

            if (type === "إشعار") {
                productFields.classList.add('hidden');
                noteFields.classList.remove('hidden');
                targetLabel.innerText = "توجيه الإشعار إلى فرع";
            } else {
                productFields.classList.remove('hidden');
                noteFields.classList.add('hidden');
                targetLabel.innerText = (type === "تحويل") ? "اطلب من فرع" : "فرع الطلب";
            }
        }

        async function sendData() {
            const type = document.getElementById('type').value;
            const targetBranch = document.getElementById('target_branch').value;
            const btn = document.getElementById('send-btn');
            
            let payload = {
                action: "insert",
                user: activeUser,
                branch: userBranch // الفرع الحالي للمستخدم
            };

            if (type === "إشعار") {
                const note = document.getElementById('note_text').value;
                if (!note) return alert("يرجى كتابة نص الإشعار");
                
                payload.type = "إشعار";
                payload.target_branch = targetBranch;
                payload.note = note;
                payload.done = false;
            } else {
                const itemName = document.getElementById('item_name').value;
                if (!itemName) return alert("يرجى كتابة اسم الصنف");

                payload.type = type; // شراء أو تحويل أو جرد
                payload.target_branch = targetBranch; // في المشتريات والجرد يكون نفس الفرع غالباً
                payload.item_name = itemName;
                payload.qty = document.getElementById('qty').value;
            }

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            try {
                const success = await updateData(payload);
                if (success) {
                    alert("تم الإرسال بنجاح ✅");
                    // إعادة تصغير الحقول
                    document.getElementById('item_name').value = "";
                    document.getElementById('note_text').value = "";
                } else {
                    alert("فشل في الإرسال ❌");
                }
            } catch (e) {
                alert("خطأ في الاتصال");
            } finally {
                btn.disabled = false;
                btn.innerText = "إرسال الآن";
            }
        }
    </script>
</body>
</html>
