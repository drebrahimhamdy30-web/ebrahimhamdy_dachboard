<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب جديد - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html" id="link-main" class="active">➕ مدخلات جديدة</a>
            <a href="purchases.html" id="link-purchases">🛒 سجل المشتريات</a>
            <a href="transfers.html" id="link-transfers">🔄 التحويلات</a>
            <a href="notifications.html" id="link-notifications">🔔 الإشعارات</a>
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: auto;">
            <h2 style="text-align: center; margin-bottom: 20px;">أضف طلب جديد للفرع</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>نوع الطلب</label>
                    <select id="type" required>
                        <option value="شراء">طلب شراء (نقص)</option>
                        <option value="تحويل">تحويل بين الفروع</option>
                        <option value="جرد">إشعار جرد</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>الفرع الطالب</label>
                    <select id="branch" required>
                        <option value="فرع المعمورة">فرع المعمورة</option>
                        <option value="فرع سان ستيفانو">فرع سان ستيفانو</option>
                        <option value="فرع سيدى بشر">فرع سيدى بشر</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>اسم المنتج / الكود</label>
                    <input type="text" id="item" placeholder="مثلاً: بانتوجار كبسول" required>
                </div>

                <div class="form-group">
                    <label>الكمية المطلوبة</label>
                    <input type="number" id="qty" placeholder="0" required>
                </div>

                <button type="button" id="submitBtn" class="btn btn-success" style="width: 100%; margin-top: 15px;" onclick="submitOrder()">
                    إرسال الطلب الآن
                </button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // 1. التأكد من الهوية وتجهيز البيانات
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch');

        if (activeUser) {
            // تحديث اسم المستخدم في الشريط
            document.getElementById('nav-user').innerText = activeUser;
            
            // اختيار فرع المستخدم تلقائياً في القائمة (اختياري لتسهيل الإدخال)
            if (userBranch) {
                const branchSelect = document.getElementById('branch');
                // محاولة مطابقة الفرع المخزن مع خيارات القائمة
                for (let option of branchSelect.options) {
                    if (option.value.includes(userBranch)) {
                        option.selected = true;
                        break;
                    }
                }
            }
        }

        // 2. دالة إرسال الطلب لـ n8n
        async function submitOrder() {
            const user = checkAuth();
            if (!user) return;

            const btn = document.getElementById('submitBtn');
            const formData = {
                user: user,
                type: document.getElementById('type').value,
                branch: document.getElementById('branch').value,
                product: document.getElementById('item').value, // تأكد من مطابقة المسمى في n8n (product)
                quantity: document.getElementById('qty').value,
                status: 'pending', // حالة افتراضية للطلبات الجديدة
                createdAt: new Date().toLocaleString('ar-EG') // تاريخ بتنسيق عربي
            };

            try {
                btn.disabled = true;
                btn.innerText = "جاري الإرسال...";
                
                const success = await postData(formData);
                
                if (success) {
                    alert("تم إرسال الطلب بنجاح ✅");
                    document.getElementById('orderForm').reset();
                } else {
                    alert("فشل الإرسال، تأكد من اتصال n8n");
                }
            } catch (error) {
                console.error("Submit Error:", error);
                alert("حدث خطأ غير متوقع");
            } finally {
                btn.disabled = false;
                btn.innerText = "إرسال الطلب الآن";
            }
        }
    </script>
</body>
</html>
