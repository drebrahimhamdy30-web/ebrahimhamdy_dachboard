<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب جديد</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none !important; }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;
        }
        /* تعديل لعرض الحقول بجانب بعضها بشكل سليم */
        .flex-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .flex-row > div { flex: 1; }
        .btn-submit { 
            width: 100%; background: #28a745; color: white; border: none; padding: 15px; 
            border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html" class="active">➕ مدخلات</a>
            <a href="purchases.html">🛒 مشتريات</a>
            <a href="transfers.html">🔄 تحويلات</a>
            <a href="inventory.html">📋 جرد</a> 
            <a href="notifications.html">🔔 إشعارات</a> 
        </div>
        <div class="user-info" style="color: white;">
            <span id="nav-user"></span>
            <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:2px 8px; border-radius:4px;">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: auto;">
            <h2 style="text-align: center; margin-bottom: 20px;">📝 أضف طلب جديد</h2>
            
            <form id="orderForm">
                <div class="form-group">
                    <label>نوع العملية</label>
                    <select id="type" onchange="handleTypeChange()">
                        <option value="شراء">طلب شراء (نقص) 🛒</option>
                        <option value="تحويل">تحويل بين الفروع 🔄</option>
                        <option value="جرد">جرد صنف 📋</option>
                        <option value="إشعار">إرسال إشعار 🔔</option>
                    </select>
                </div>

                <div class="form-group" id="branch-div">
                    <label>توجيه إلى فرع</label>
                    <select id="branch">
                        <option value="المعمورة">المعمورة</option>
                        <option value="سان ستيفانو">سان ستيفانو</option>
                        <option value="سيدى بشر">سيدى بشر</option>
                    </select>
                </div>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                <div id="item-section">
                    <div class="flex-row">
                        <div class="form-group">
                            <label>كود الصنف</label>
                            <input type="text" id="item_code" placeholder="اختياري">
                        </div>
                        <div class="form-group" id="item-name-div">
                            <label>اسم الصنف</label>
                            <input type="text" id="item_name" placeholder="اختياري">
                        </div>
                    </div>
                </div>

                <div id="extra-section">
                    <div class="flex-row">
                        <div class="form-group">
                            <label>كود العميل</label>
                            <input type="text" id="customer_code" placeholder="اختياري">
                        </div>
                        <div class="form-group">
                            <label>اسم العميل</label>
                            <input type="text" id="customer_name" placeholder="اختياري">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>الكمية المطلوبة</label>
                        <input type="number" id="qty" value="1">
                    </div>
                </div>

                <div id="note-section" class="hidden">
                    <div class="form-group">
                        <label>نص الإشعار</label>
                        <textarea id="note_text" rows="4" placeholder="اكتب التفاصيل هنا..."></textarea>
                    </div>
                </div>

                <button type="button" id="submitBtn" class="btn-submit" onclick="submitOrder()">
                    <i class="fas fa-paper-plane"></i> إرسال الآن
                </button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // استرجاع بيانات المستخدم
        const activeUser = checkAuth();
        const userBranch = localStorage.getItem('userBranch') || "المعمورة";

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            // تعيين فرع المستخدم كقيمة افتراضية
            document.getElementById('branch').value = userBranch;
            handleTypeChange();
        }

        function handleTypeChange() {
            const type = document.getElementById('type').value;
            const branchSelect = document.getElementById('branch');
            const branchDiv = document.getElementById('branch-div');
            const itemSection = document.getElementById('item-section');
            const itemNameDiv = document.getElementById('item-name-div');
            const extraSection = document.getElementById('extra-section');
            const noteSection = document.getElementById('note-section');

            // إظهار الكل كبداية
            branchDiv.classList.remove('hidden');
            itemSection.classList.remove('hidden');
            itemNameDiv.classList.remove('hidden');
            extraSection.classList.remove('hidden');
            noteSection.classList.add('hidden');
            branchSelect.disabled = false;

            if (type === "جرد") {
                itemNameDiv.classList.add('hidden');
                extraSection.classList.add('hidden');
            } else if (type === "إشعار") {
                itemSection.classList.add('hidden');
                extraSection.classList.add('hidden');
                noteSection.classList.remove('hidden');
            } else if (type === "شراء") {
                branchSelect.value = userBranch;
                branchSelect.disabled = true; // الشراء للفرع نفسه دائماً
            }
        }

        async function submitOrder() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "⏳ جاري الإرسال...";

            const type = document.getElementById('type').value;
            const branchVal = document.getElementById('branch').value;

            try {
                let success = false;
                if (type === "إشعار") {
                    success = await postNotification({
                        action: "insert",
                        type: "إشعار",
                        branch: userBranch,
                        target_branch: branchVal,
                        note: document.getElementById('note_text').value,
                        done: false,
                        user: activeUser,
                        createdAt: new Date().toISOString()
                    });
                } else {
                    success = await postData({
                        user: activeUser,
                        type: type,
                        branch: branchVal,
                        item_code: document.getElementById('item_code').value,
                        item: document.getElementById('item_name').value,
                        customer_code: document.getElementById('customer_code').value,
                        customer_name: document.getElementById('customer_name').value,
                        qty: document.getElementById('qty').value || 0,
                        state: 'pending',
                        createdAt: new Date().toISOString()
                    });
                }

                if (success) {
                    alert("تم الإرسال بنجاح ✅");
                    document.getElementById('orderForm').reset();
                    handleTypeChange();
                } else {
                    alert("فشل الإرسال ❌");
                }
            } catch (e) {
                alert("خطأ في الاتصال");
            } finally {
                btn.disabled = false;
                btn.innerText = "إرسال الآن";
            }
        }
    </script>
</body>
</html>
