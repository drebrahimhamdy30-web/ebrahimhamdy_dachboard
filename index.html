<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول نظام الصيدليات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #1a73e8; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error-msg { color: #d93025; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="handleLogin()">دخول</button>
        <div id="errorMessage" class="error-msg"></div>
    </div>

    <script src="api.js"></script>

    <script>
        async function handleLogin() {
            const userField = document.getElementById('username');
            const passField = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            const user = userField.value.trim();
            const pass = passField.value.trim();

            if (!user || !pass) {
                alert("برجاء إدخال اسم المستخدم وكلمة المرور");
                return;
            }

            // تجهيز الواجهة للانتظار
            loginBtn.disabled = true;
            loginBtn.innerText = "جاري التحقق...";
            errorDiv.style.display = "none";

            try {
                // استدعاء دالة login من api.js
                const result = await login(user, pass);

                // فحص النتيجة بناءً على الرد المتوقع من n8n
                if (result && (result.success === true || result.status === "success")) {
                    
                    // حفظ البيانات في المتصفح قبل الانتقال
                    localStorage.setItem('userBranch', user);
                    localStorage.setItem('activeUser', user);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    // الانتقال لصفحة المدخلات
                    window.location.replace("main.html"); 
                } else {
                    // فشل تسجيل الدخول
                    errorDiv.innerText = result.message || "خطأ في اسم المستخدم أو كلمة المرور";
                    errorDiv.style.display = "block";
                    resetBtn();
                }
            } catch (error) {
                console.error("Login logic error:", error);
                alert("تعذر الاتصال بالسيرفر. تأكد من تشغيل الـ Workflow");
                resetBtn();
            }
        }

        function resetBtn() {
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = false;
            loginBtn.innerText = "دخول";
        }
    </script>
</body>
</html>
