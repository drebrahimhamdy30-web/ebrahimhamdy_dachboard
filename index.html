<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول نظام الصيدليات</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="handleLogin()">دخول</button>
    </div>

    <script src="api.js"></script>

<script>
    async function handleLogin() {
        const userField = document.getElementById('username');
        const passField = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');

        const user = userField.value.trim();
        const pass = passField.value.trim();

        if (!user || !pass) {
            alert("برجاء إدخال اسم المستخدم وكلمة المرور");
            return;
        }

        // تحسين تجربة المستخدم: تعطيل الزر أثناء التحميل
        loginBtn.disabled = true;
        loginBtn.innerText = "جاري التحقق...";

        try {
            // استدعاء دالة الدخول من ملف api.js
            const result = await login(user, pass);

            // نتحقق أولاً هل النتيجة موجودة ولديها حالة نجاح
            if(result && result.success) {
                // حفظ البيانات
                localStorage.setItem('userBranch', user);
                localStorage.setItem('activeUser', user);
                localStorage.setItem('isLoggedIn', 'true');
                
                // التوجه لصفحة الطلبات
                window.location.href = "main.html"; 
            } else {
                // إذا عاد السيرفر برد مدروس (كلمة سر خطأ مثلاً)
                alert(result && result.message ? result.message : "خطأ في بيانات الدخول");
                loginBtn.disabled = false;
                loginBtn.innerText = "دخول";
            }
        } catch (error) {
            // هنا يقع الخطأ إذا كان الـ n8n مغلق أو الرابط خطأ
            console.error("خطأ اتصال:", error);
            
            // تنبيه: إذا كنت تدخل رغم ظهور الخطأ، فهذا يعني أن دالة login 
            // في ملف api.js تنجح ولكن الـ catch في هذا الملف تعمل لسبب تقني (مثل timeout)
            alert("فشل الاتصال بالسيرفر. تحقق من الـ Workflow أو اتصال الإنترنت.");
            
            loginBtn.disabled = false;
            loginBtn.innerText = "دخول";
        }
    }
</script>
</body>
</html>
