<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول نظام الصيدليات</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم (مثلاً: د. إبراهيم)">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول</button>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user && pass === "1234") { // يمكنك تغيير كلمة المرور هنا
                localStorage.setItem('activeUser', user); // حفظ الاسم
                window.location.href = "main.html"; // التوجه لصفحة الطلبات
            } else {
                alert("برجاء إدخال اسم المستخدم وكلمة مرور صحيحة");
            }
        }
    </script>
</body>
</html>
