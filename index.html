<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة طلب جديد</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>أضف طلب جديد</h2>
    
    <form id="orderForm">
        <div class="form-group">
            <label for="orderType">اختر نوع الطلب</label>
            <select id="orderType" onchange="toggleFields()" required>
                <option value="">-- اختر النوع --</option>
                <option value="شراء">شراء</option>
                <option value="تحويل">تحويل</option>
                <option value="اشعار">إشعار</option>
                <option value="جرد">جرد</option>
            </select>
        </div>

        <div class="form-group">
            <label for="targetBranch">الفرع المستهدف (Target Branch)</label>
            <select id="targetBranch" required>
                <option value="المعمورة">فرع المعمورة</option>
                <option value="سان ستيفانو">فرع سان ستيفانو</option>
                <option value="سيدى بشر">فرع سيدى بشر</option>
            </select>
        </div>

        <div id="dynamicFields">
            
            <div id="productField" class="form-group hidden">
                <label>كود أو اسم المنتج</label>
                <input type="text" placeholder="أدخل بيانات المنتج">
            </div>

            <div id="quantityField" class="form-group hidden">
                <label>الكمية</label>
                <input type="number" placeholder="0">
            </div>

            <div id="customerField" class="form-group hidden">
                <label>كود أو اسم العميل</label>
                <input type="text" placeholder="أدخل بيانات العميل">
            </div>

            <div id="noticeFields" class="form-group hidden">
                <label>محتوى الإشعار</label>
                <textarea rows="3" placeholder="اكتب تفاصيل الإشعار هنا..."></textarea>
                
                <label style="margin-top: 10px;">الجهة المختصة</label>
                <select>
                    <option value="مبيعات">مبيعات</option>
                    <option value="مشتريات">مشتريات</option>
                    <option value="مدخل بيانات">مدخل بيانات</option>
                    <option value="جرد">جرد</option>
                    <option value="ادارة">إدارة</option>
                    <option value="حسابات">حسابات</option>
                </select>
            </div>

        </div>

        <button type="submit">إرسال الطلب</button>
    </form>
</div>

<script>
    function toggleFields() {
        const type = document.getElementById('orderType').value;
        
        // إخفاء الكل أولاً
        document.getElementById('productField').classList.add('hidden');
        document.getElementById('quantityField').classList.add('hidden');
        document.getElementById('customerField').classList.add('hidden');
        document.getElementById('noticeFields').classList.add('hidden');

        if (type === 'شراء' || type === 'تحويل') {
            document.getElementById('productField').classList.remove('hidden');
            document.getElementById('quantityField').classList.remove('hidden');
            document.getElementById('customerField').classList.remove('hidden');
        } else if (type === 'جرد') {
            document.getElementById('productField').classList.remove('hidden');
        } else if (type === 'اشعار') {
            document.getElementById('noticeFields').classList.remove('hidden');
        }
    }
</script>

</body>
</html>
