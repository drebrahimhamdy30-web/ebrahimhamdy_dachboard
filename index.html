<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background-color: #f4f7f9; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border-right: 6px solid #0088cc; }
        h2 { text-align: center; color: #0088cc; margin-bottom: 20px; }
        label { font-size: 13px; color: #666; display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: #0088cc; outline: none; }
        input[readonly] { background: #f9f9f9; color: #888; cursor: not-allowed; border-style: dashed; }
        .vendor-input { border-color: #ffc107; background-color: #fffdf5; } /* لون مميز للموردين */
        .diff-box { margin-top: 12px; padding: 10px; background: #eef9ff; border-radius: 8px; text-align: center; font-weight: bold; color: #005a8d; font-size: 15px; }
        button { width: 100%; padding: 18px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h2>مطابقة أرصدة المحافظ والمدفوعات 🔍</h2>
    <div id="wallets_container"></div>
    <button id="submit_btn">إرسال تقرير التقفيل ✅</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        
        const wallets = [
            { id: 'paymob', name: 'باي موب (Paymob)', key: 'p_paymob' },
            { id: 'fawry1843', name: 'فورى 1843', key: 'p_fawry8003' },
            { id: 'fawry6060', name: 'فورى 6060', key: 'p_fawry6064' },
            { id: 'vodafone', name: 'فودافون كاش', key: 'p_vodafone' }
        ];

        const container = document.getElementById('wallets_container');
        wallets.forEach(w => {
            const prevVal = parseFloat(params.get(w.key)) || 0;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <strong style="font-size: 17px;">${w.name}</strong>
                <label>الرصيد الافتتاحي (من الشيت):</label>
                <input type="number" id="prev_${w.id}" value="${prevVal.toFixed(2)}" readonly>
                
                <label style="color: #d9534f;">مدفوعات موردين (صرف):</label>
                <input type="number" class="calc-input vendor-input" id="vendor_${w.id}" data-id="${w.id}" placeholder="0.00" inputmode="decimal">

                <label>الرصيد الحالي بالماكينة:</label>
                <input type="number" class="calc-input" id="curr_${w.id}" data-id="${w.id}" placeholder="0.00" inputmode="decimal">
                
                <div class="diff-box">الصافي (مبيعات): <span id="diff_${w.id}">0.00</span> ج.م</div>
            `;
            container.appendChild(div);
        });

        // كود حساب الصافي المعدل
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('calc-input')) {
                const id = e.target.getAttribute('data-id');
                const prev = parseFloat(document.getElementById(`prev_${id}`).value) || 0;
                const vendor = parseFloat(document.getElementById(`vendor_${id}`).value) || 0;
                const curr = parseFloat(document.getElementById(`curr_${id}`).value) || 0;
                
                // المعادلة: (الحالي + اللي اتصرف للمورد) - القديم
                const diff = ((curr + vendor) - prev).toFixed(2);
                document.getElementById(`diff_${id}`).innerText = diff;
            }
        });

        document.getElementById('submit_btn').onclick = () => {
            const resultData = {
                timestamp: new Date().toLocaleString('ar-EG'),
                report_type: "Wallet Matching with Vendor Payouts",
                details: {}
            };

            wallets.forEach(w => {
                const p = parseFloat(document.getElementById(`prev_${w.id}`).value) || 0;
                const v = parseFloat(document.getElementById(`vendor_${w.id}`).value) || 0;
                const c = parseFloat(document.getElementById(`curr_${w.id}`).value) || 0;
                resultData.details[w.id] = {
                    name: w.name,
                    opening: p,
                    vendor_payout: v,
                    closing: c,
                    net_sales: ((c + v) - p).toFixed(2)
                };
            });

            tg.sendData(JSON.stringify(resultData)); 
            tg.close();
        };
    </script>
</body>
</html>
