<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="user-info">المستخدم: <span id="displayUser">...</span></div>
        <div class="logo"><b>إدارة المشتريات المركزي</b></div>
        <button class="btn btn-danger" onclick="logout()">خروج</button>
    </header>

    <nav class="nav-menu">
        <a href="main.html" class="nav-link">إضافة طلب</a>
        <a href="purchases.html" class="nav-link active">المشتريات</a>
    </nav>

    <div class="container">
        <div class="card">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 8px;">
                <label>تصفية حسب الحالة:</label>
                <select id="statusFilter" onchange="renderTable()" style="padding: 5px;">
                    <option value="new" selected>طلبات جديدة (انتظار)</option>
                    <option value="ordered">تم الطلب ✅</option>
                    <option value="unavailable">غير متوفر ❌</option>
                    <option value="all">عرض الكل (السجل بالكامل)</option>
                </select>
                <button class="btn btn-success" onclick="loadPurchases()">تحديث البيانات ↻</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="purchasesTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th>الشركة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const user = checkAuth();
        document.getElementById('displayUser').innerText = user;
        let allData = [];

        async function loadPurchases() {
            const tbody = document.querySelector('#purchasesTable tbody');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري جلب البيانات من السيرفر...</td></tr>';
            try {
                allData = await fetchData();
                console.log("البيانات القادمة:", allData); // للتأكد من وصول كل الصفوف في الكونسول
                renderTable();
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">خطأ في الاتصال بالسيرفر</td></tr>';
            }
        }

        function renderTable() {
            const tbody = document.querySelector('#purchasesTable tbody');
            const filterValue = document.getElementById('statusFilter').value;
            
            // 1. استخراج كافة صفوف "شراء" فقط وتجاوز أي مسافات زائدة في النص
            let filtered = allData.filter(item => item.type && item.type.trim() === 'شراء');

            // 2. تطبيق منطق التصفية بناءً على الاختيار
            if (filterValue === 'new') {
                // يعرض فقط الصفوف التي ليس لها حالة أو حالتها فارغة (الانتظار)
                filtered = filtered.filter(item => !item.status || item.status.trim() === '' || item.status === 'انتظار');
            } else if (filterValue !== 'all') {
                // يعرض الحالة المختارة فقط (ordered أو unavailable)
                filtered = filtered.filter(item => item.status === filterValue);
            }

            // 3. ترتيب البيانات (الأحدث تاريخاً يظهر في الأعلى)
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            // 4. مسح الجدول ورسم كافة الصفوف المفلترة
            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا توجد سجلات مطابقة لهذا الفلتر</td></tr>';
                return;
            }

            filtered.forEach(o => {
                const row = `<tr>
                    <td>${formatDate(o.createdAt)}</td>
                    <td>${o.branch}</td>
                    <td>${o.item}</td>
                    <td>${o.qty}</td>
                    <td>
                        <select id="status-${o.id}">
                            <option value="" ${(!o.status || o.status.trim() === '') ? 'selected' : ''}>انتظار ⏳</option>
                            <option value="ordered" ${o.status === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                            <option value="unavailable" ${o.status === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                        </select>
                    </td>
                    <td><input type="text" id="company-${o.id}" value="${o.company || ''}" style="width:90px"></td>
                    <td><button class="btn btn-success" onclick="updateStatus('${o.id}')">حفظ</button></td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        async function updateStatus(id) {
            const data = {
                id: id,
                status: document.getElementById(`status-${id}`).value,
                company: document.getElementById(`company-${id}`).value,
                action: 'update_status'
            };
            try {
                await postData(data);
                alert("تم التحديث بنجاح");
                loadPurchases(); // تحديث تلقائي للجدول بعد الحفظ
            } catch (e) { 
                alert("حدث خطأ أثناء الحفظ"); 
            }
        }
        window.onload = loadPurchases;
    </script>
</body>
</html>
