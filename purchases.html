<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="user-info">المستخدم: <span id="displayUser">...</span></div>
        <div class="logo"><b>إدارة المشتريات المركزي</b></div>
        <button class="btn btn-danger" onclick="logout()">خروج</button>
    </header>

    <nav class="nav-menu">
        <a href="main.html" class="nav-link">إضافة طلب</a>
        <a href="purchases.html" class="nav-link active">المشتريات</a>
    </nav>

    <div class="container">
        <div class="card">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 8px;">
                <label>تصفية حسب الحالة:</label>
                <select id="statusFilter" onchange="renderTable()" style="padding: 5px;">
                    <option value="new" selected>طلبات جديدة (انتظار)</option>
                    <option value="ordered">تم الطلب ✅</option>
                    <option value="unavailable">غير متوفر ❌</option>
                    <option value="all">عرض الكل (السجل بالكامل)</option>
                </select>
                <button class="btn btn-success" onclick="loadPurchases()">تحديث البيانات ↻</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="purchasesTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th>الشركة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const user = checkAuth();
        document.getElementById('displayUser').innerText = user;
        let allData = [];

        async function loadPurchases() {
            const tbody = document.querySelector('#purchasesTable tbody');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري جلب البيانات من السيرفر...</td></tr>';
            try {
                allData = await fetchData();
                console.log("البيانات القادمة:", allData); // للتأكد من وصول كل الصفوف في الكونسول
                renderTable();
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">خطأ في الاتصال بالسيرفر</td></tr>';
            }
        }

function renderTable() {
    const tbody = document.querySelector('#purchasesTable tbody');
    const filterValue = document.getElementById('statusFilter').value;
    
    // 1. تصفية "شراء" مع تنظيف النص من المسافات
    let filtered = allData.filter(item => {
        return item.type && item.type.toString().trim() === 'شراء';
    });

    console.log("إجمالي طلبات الشراء المكتشفة:", filtered.length);

    // 2. منطق التصفية حسب الحالة
    if (filterValue !== 'all') {
        filtered = filtered.filter(item => {
            const currentStatus = (item.status || item.state || "").toString().trim().toLowerCase();
            
            if (filterValue === 'new') {
                return currentStatus === "" || currentStatus === "انتظار" || currentStatus.includes('{'); 
            }
            return currentStatus === filterValue.toLowerCase();
        });
    }

    // 3. مسح ورسم الجدول
    tbody.innerHTML = '';
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا توجد بيانات مطابقة (تأكد من تحديث البيانات ↻)</td></tr>';
        return;
    }

    // رسم كل الصفوف المفلترة بدون استثناء
    filtered.forEach(o => {
        const currentStatus = (o.status || o.state || "").toString().trim().toLowerCase();
        const row = `<tr>
            <td>${formatDate(o.createdAt)}</td>
            <td>${o.branch || ''}</td>
            <td>${o.item || ''}</td>
            <td>${o.qty || ''}</td>
            <td>
                <select id="status-${o.id}">
                    <option value="" ${currentStatus === "" || currentStatus.includes('{') ? 'selected' : ''}>انتظار ⏳</option>
                    <option value="ordered" ${currentStatus === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                    <option value="unavailable" ${currentStatus === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                </select>
            </td>
            <td><input type="text" id="company-${o.id}" value="${o.company || ''}" style="width:90px"></td>
            <td><button class="btn btn-success" onclick="updateStatus('${o.id}')">حفظ</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
    });
}

        async function updateStatus(id) {
            const data = {
                id: id,
                status: document.getElementById(`status-${id}`).value,
                company: document.getElementById(`company-${id}`).value,
                action: 'update_status'
            };
            try {
                await postData(data);
                alert("تم التحديث بنجاح");
                loadPurchases(); // تحديث تلقائي للجدول بعد الحفظ
            } catch (e) { 
                alert("حدث خطأ أثناء الحفظ"); 
            }
        }
        window.onload = loadPurchases;
    </script>
</body>
</html>
