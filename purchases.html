<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html" class="active">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="notifications.html">🔔 الإشعارات</a>
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">فحص سجل البيانات الشامل</h2>

            <div style="background: #fff9c4; padding: 15px; border-radius: 8px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #fbc02d; gap: 10px;">
                <button onclick="loadOrders()" class="btn-success" style="width: auto; padding: 8px 15px;">تحديث البيانات 🔄</button>
                <div>
                    <label style="font-weight: bold; margin-left: 10px;">تصفية حسب الحالة:</label>
                    <select id="statusFilter" onchange="applyFilter()" style="width: 200px; padding: 5px; border-radius: 5px;">
                        <option value="all">عرض الكل</option>
                        <option value="pending" selected>في الانتظار ⏳</option>
                        <option value="ordered">تم الطلب ✅</option>
                        <option value="unavailable">غير متوفر ❌</option>
                    </select>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الشركة الموردة</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
  <script>
    const activeUser = checkAuth();
    const userRole = (localStorage.getItem('userRole') || '').toLowerCase();
    
    // تعريف المتغير عالمياً لضمان الوصول إليه من كل الدوال
    let rawData = []; 

    const privilegedUsers = ['ebrahim', 'sanstefano', 'admin', 'manager'];
    const canEdit = privilegedUsers.includes(activeUser?.toLowerCase()) || userRole === 'admin';

    if (activeUser) {
        document.getElementById('nav-user').innerText = activeUser;
        loadOrders();
    }

    async function loadOrders() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري جلب البيانات...</td></tr>';
        const response = await fetchData(); 
        if (response && response[0] && response[0].data) {
            rawData = response[0].data; // تخزين البيانات هنا
            applyFilter();
        } else {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا توجد بيانات</td></tr>';
        }
    }

    function renderTable(items) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        items.forEach(order => {
            const row = document.createElement('tr');
            const isDisabled = canEdit ? '' : 'disabled';
            
            const item = order.item || '-';
            const qty = order.qty || '0';
            const company = order.company || '';
            const currentState = order.state || 'pending';

            let statusClass = (currentState === 'ordered') ? 'status-ordered' : 
                             (currentState === 'unavailable') ? 'status-unavailable' : 'status-waiting';

            row.innerHTML = `
                <td>${order.id}</td>
                <td>${order.branch}</td>
                <td>${item}</td>
                <td>${qty}</td>
                <td>
                    <input type="text" class="company-input" value="${company}" 
                           placeholder="اسم الشركة..." ${isDisabled}
                           style="width: 130px; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                </td>
                <td>
                    <select class="form-select ${statusClass}" onchange="updateStatusColor(this)" ${isDisabled}>
                        <option value="pending" ${currentState === 'pending' ? 'selected' : ''}>انتظار ⏳</option>
                        <option value="ordered" ${currentState === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                        <option value="unavailable" ${currentState === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                    </select>
                </td>
                <td>
                    ${canEdit ? `<button class="btn-success" style="width:auto; padding:5px 15px;" onclick="saveChanges('${order.id}', this)">حفظ</button>` : '-'}
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function applyFilter() {
        const val = document.getElementById('statusFilter').value;
        renderTable(val === 'all' ? rawData : rawData.filter(o => (o.state || 'pending') === val));
    }

    function updateStatusColor(select) {
        select.classList.remove('status-waiting', 'status-ordered', 'status-unavailable');
        if (select.value === 'pending') select.classList.add('status-waiting');
        else if (select.value === 'ordered') select.classList.add('status-ordered');
        else if (select.value === 'unavailable') select.classList.add('status-unavailable');
    }

    async function saveChanges(id, btn) {
        const row = btn.closest('tr');
        const newState = row.querySelector('select').value;
        const newCompany = row.querySelector('.company-input').value;
        
        btn.disabled = true;
        btn.innerText = "⏳";

        // إرسال البيانات بما يتوافق مع الـ Update Row في n8n
        const success = await updateData({ 
            id: id, 
            status: newState, 
            company: newCompany,
            action: "update_status" 
        });

        if (success) {
            alert("تم الحفظ في السيرفر ✅");
            loadOrders(); 
        } else {
            alert("فشل الحفظ ❌");
            btn.disabled = false;
            btn.innerText = "حفظ";
        }
    }
</script>
