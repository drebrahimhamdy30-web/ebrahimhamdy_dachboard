<script src="api.js"></script>
<script>
    const activeUser = checkAuth();
    let rawData = []; 

    // نظام الصلاحيات: جعل canEdit متاحاً دائماً طالما سجلت الدخول
    const canEdit = true; 

    if (activeUser) {
        document.getElementById('nav-user').innerText = activeUser;
        window.onload = loadOrders;
    }

    async function loadOrders() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">جاري جلب البيانات...</td></tr>';
        
        try {
            // نستخدم fetchOrders() الموحدة في api.js التي ترسل ?type=orders
            const response = await fetchOrders(); 
            
            // التحقق من وصول البيانات (سواء مصفوفة مباشرة أو داخل كائن data)
            let dataToProcess = Array.isArray(response) ? response : (response.data || []);
            
            if (dataToProcess.length > 0) {
                // تصفية البيانات لتشمل نوع "شراء" فقط
                rawData = dataToProcess.filter(item => item.type === "شراء");
                generateBranchCheckboxes(rawData);
                applyFilter();
            } else {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد بيانات متاحة</td></tr>';
            }
        } catch (error) {
            console.error("Load Error:", error);
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:red;">خطأ في الاتصال بالسيرفر</td></tr>';
        }
    }

    function generateBranchCheckboxes(data) {
        const container = document.getElementById('branchList');
        const branches = [...new Set(data.map(item => item.branch))]
                         .filter(b => b && b.trim() !== '')
                         .sort();
        
        container.innerHTML = '';
        branches.forEach(br => {
            const label = document.createElement('label');
            label.className = 'branch-item';
            label.innerHTML = `
                <input type="checkbox" class="branch-cb" value="${br}" checked onchange="applyFilter()">
                ${br}
            `;
            container.appendChild(label);
        });
    }

    function applyFilter() {
        const statusVal = document.getElementById('statusFilter').value;
        const selectedBranches = Array.from(document.querySelectorAll('.branch-cb:checked'))
                                      .map(cb => cb.value);

        const filtered = rawData.filter(order => {
            const stateMatch = (statusVal === 'all') || (order.state || 'pending') === statusVal;
            const branchMatch = selectedBranches.includes(order.branch);
            return stateMatch && branchMatch;
        });

        renderTable(filtered);
    }

    function renderTable(items) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px;">لا توجد بيانات تطابق الفلاتر</td></tr>';
            return;
        }

        items.forEach((order) => {
            const row = document.createElement('tr');
            const currentState = order.state || 'pending';
            const displayId = order.id;

            row.innerHTML = `
                <td>${displayId}</td>
                <td style="font-weight:bold;">${order.branch || '-'}</td>
                <td style="color: #666;">${order.item_code || '-'}</td>
                <td>${order.item_name || '-'}</td>
                <td>${order.qty || '0'}</td>
                <td>
                    <input type="text" class="company-in" value="${order.company || ''}" 
                           style="width:110px; padding:4px;">
                </td>
                <td>
                    <select class="form-select" style="padding: 4px; border-radius: 4px;">
                        <option value="pending" ${currentState === 'pending' ? 'selected' : ''}>انتظار ⏳</option>
                        <option value="ordered" ${currentState === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                        <option value="unavailable" ${currentState === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                    </select>
                </td>
                <td>
                    <button class="btn-success" onclick="saveRow('${displayId}', this)" style="padding:4px 10px;">حفظ</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    async function saveRow(id, btn) {
        const row = btn.closest('tr');
        const status = row.querySelector('select').value;
        const company = row.querySelector('.company-in').value;
        
        btn.disabled = true;
        btn.innerText = "⏳";

        // إرسال البيانات للويب هوك الموحد بنوع POST
        const success = await updateData({ 
            id: id, 
            status: status, 
            company: company, 
            type: "شراء", 
            action: "update_status" 
        });

        if (success) {
            alert("تم التحديث بنجاح ✅");
            loadOrders(); 
        } else {
            alert("فشل التحديث ❌");
            btn.disabled = false;
            btn.innerText = "حفظ";
        }
    }
</script>
