<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html" class="active">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="notifications.html">🔔 الإشعارات</a>
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">فحص سجل البيانات الشامل</h2>

            <div style="background: #fff9c4; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #fbc02d;">
                <div>
                    <label style="display: inline; margin-left: 10px;">تصفية حسب الحالة:</label>
                    <select id="statusFilter" onchange="filterTable()" style="width: 200px; display: inline-block;">
                        <option value="all">عرض كل البيانات (بدون استثناء)</option>
                        <option value="pending">في الانتظار ⏳</option>
                        <option value="ordered">تم الطلب ✅</option>
                        <option value="unavailable">غير متوفر ❌</option>
                    </select>
                </div>
                <button onclick="loadOrders()" class="btn-success" style="width: auto; padding: 8px 15px; background-color: #2ecc71;">تحديث البيانات من السيرفر 🔄</button>
            </div>

            <div id="status-message" style="text-align: center; margin-bottom: 10px;"></div>

            <div style="overflow-x: auto;">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>النوع</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th id="action-header">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userRole = localStorage.getItem('userRole');
        const userBranch = localStorage.getItem('userBranch');
        let allOrders = []; // لتخزين البيانات محلياً للتصفية السريعة

        if (activeUser) {
            document.getElementById('nav-user').innerText = `${activeUser} (${userBranch})`;
            loadOrders();
        }

        async function loadOrders() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري التحميل...</td></tr>';
            
            const data = await fetchData();
            if (data) {
                allOrders = data;
                renderTable(allOrders);
            }
        }

        // دالة رسم الجدول (Rendering)
        function renderTable(dataList) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            dataList.forEach(order => {
                const row = document.createElement('tr');
                const isAdmin = (userRole === 'admin' || userRole === 'manager');
                const isDisabled = !isAdmin ? 'disabled' : '';
                
                const product = order.product || order.item || 'undefined';
                const quantity = order.quantity || order.qty || '0';
                
                let statusClass = '';
                if (order.status === 'pending') statusClass = 'status-waiting';
                else if (order.status === 'ordered') statusClass = 'status-ordered';
                else if (order.status === 'unavailable') statusClass = 'status-unavailable';

                row.innerHTML = `
                    <td>${order.id}</td>
                    <td>${order.type}</td>
                    <td>${order.branch}</td>
                    <td>${product}</td>
                    <td>${quantity}</td>
                    <td>
                        <select class="form-select ${statusClass}" onchange="updateStatusLocal(this)" ${isDisabled}>
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>في الانتظار ⏳</option>
                            <option value="ordered" ${order.status === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                            <option value="unavailable" ${order.status === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                        </select>
                    </td>
                    <td class="action-cell">
                        ${isAdmin ? `<button class="btn-success" style="padding: 5px 10px; font-size: 0.8rem; width: auto;" onclick="saveChanges('${order.id}', this)">حفظ</button>` : '-'}
                    </td>
                `;
                tbody.appendChild(row);
            });

            if (userRole === 'employee') {
                document.getElementById('action-header').style.display = 'none';
                document.querySelectorAll('.action-cell').forEach(c => c.style.display = 'none');
            }
        }

        // دالة التصفية (Filter logic)
        function filterTable() {
            const filterValue = document.getElementById('statusFilter').value;
            if (filterValue === 'all') {
                renderTable(allOrders);
            } else {
                const filtered = allOrders.filter(o => o.status === filterValue);
                renderTable(filtered);
            }
        }

        function updateStatusLocal(select) {
            select.classList.remove('status-waiting', 'status-ordered', 'status-unavailable');
            if (select.value === 'pending') select.classList.add('status-waiting');
            else if (select.value === 'ordered') select.classList.add('status-ordered');
            else if (select.value === 'unavailable') select.classList.add('status-unavailable');
        }

        // التعديل والحفظ (Update)
        async function saveChanges(id, btn) {
            const row = btn.closest('tr');
            const newStatus = row.querySelector('select').value;
            
            btn.disabled = true;
            btn.innerText = "⏳";

            // إرسال التحديث لـ n8n عبر api.js
            const success = await updateData({ id: id, status: newStatus });

            if (success) {
                alert("تم التحديث ✅");
                loadOrders();
            } else {
                alert("فشل التحديث ❌");
                btn.disabled = false;
                btn.innerText = "حفظ";
            }
        }
    </script>
</body>
</html>
