<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html" class="active">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="notifications.html">🔔 الإشعارات</a>
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">فحص سجل البيانات الشامل</h2>

            <div style="background: #fff9c4; padding: 15px; border-radius: 8px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #fbc02d; gap: 10px;">
                <button onclick="loadOrders()" class="btn-success" style="width: auto; padding: 8px 15px;">تحديث البيانات 🔄</button>
                <div>
                    <label style="font-weight: bold; margin-left: 10px;">تصفية حسب الحالة:</label>
                    <select id="statusFilter" onchange="applyFilter()" style="width: 200px; padding: 5px; border-radius: 5px;">
                        <option value="all">عرض الكل</option>
                        <option value="pending" selected>في الانتظار ⏳</option>
                        <option value="ordered">تم الطلب ✅</option>
                        <option value="unavailable">غير متوفر ❌</option>
                    </select>
                </div>
            </div>
            
            <div id="status-message" style="color: red; text-align: center; margin-bottom: 10px;"></div>

            <div style="overflow-x: auto;">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الشركة الموردة</th>
                            <th>الحالة</th>
                            <th id="action-header">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        // تحسين قراءة الصلاحية (تحويلها لنص صغير لضمان المطابقة)
        const userRole = (localStorage.getItem('userRole') || '').toLowerCase();
        const userBranch = localStorage.getItem('userBranch');
        let rawData = []; 

        if (activeUser) {
            document.getElementById('nav-user').innerText = `${activeUser} (${userBranch})`;
            loadOrders();
        }

        async function loadOrders() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري التحميل...</td></tr>';
            const response = await fetchData(); 
            if (response && response[0] && response[0].data) {
                rawData = response[0].data; 
                applyFilter();
            } else {
                document.getElementById('status-message').innerText = "لا توجد بيانات متاحة";
                tbody.innerHTML = '';
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            // شرط السماح بالتعديل: إذا كان الأدمن أو إذا كان اسم المستخدم "ebrahim"
            const canEdit = (userRole === 'admin' || userRole === 'manager' || activeUser === 'ebrahim' || activeUser === 'Ebrahim');

            items.forEach(order => {
                const row = document.createElement('tr');
                const isDisabled = !canEdit ? 'disabled' : '';
                
                const item = order.item || '-';
                const qty = order.qty || '0';
                const company = order.company || '';
                const currentState = order.state || 'pending';

                let statusClass = '';
                if (currentState === 'pending' || currentState === null) statusClass = 'status-waiting';
                else if (currentState === 'ordered') statusClass = 'status-ordered';
                else if (currentState === 'unavailable') statusClass = 'status-unavailable';

                row.innerHTML = `
                    <td>${order.id}</td>
                    <td>${order.branch}</td>
                    <td>${item}</td>
                    <td>${qty}</td>
                    <td>
                        <input type="text" class="company-input" value="${company}" 
                               placeholder="اسم الشركة..." ${isDisabled} 
                               style="width: 120px; padding: 4px; border-radius: 4px; border: 1px solid #ddd;">
                    </td>
                    <td>
                        <select class="form-select ${statusClass}" onchange="updateStatusColor(this)" ${isDisabled}>
                            <option value="pending" ${currentState === 'pending' || currentState === null ? 'selected' : ''}>انتظار ⏳</option>
                            <option value="ordered" ${currentState === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                            <option value="unavailable" ${currentState === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                        </select>
                    </td>
                    <td class="action-cell">
                        ${canEdit ? `<button class="btn-success" style="padding: 5px 12px; font-size: 0.8rem; width: auto;" onclick="saveChanges('${order.id}', this)">حفظ</button>` : '-'}
                    </td>
                `;
                tbody.appendChild(row);
            });

            // إخفاء عمود الإجراءات فقط إذا لم يكن لديه صلاحية
            if (!canEdit) {
                document.getElementById('action-header').style.display = 'none';
                document.querySelectorAll('.action-cell').forEach(c => c.style.display = 'none');
            } else {
                document.getElementById('action-header').style.display = 'table-cell';
            }
        }

        function applyFilter() {
            const val = document.getElementById('statusFilter').value;
            renderTable(val === 'all' ? rawData : rawData.filter(o => (o.state || 'pending') === val));
        }

        function updateStatusColor(select) {
            select.classList.remove('status-waiting', 'status-ordered', 'status-unavailable');
            if (select.value === 'pending') select.classList.add('status-waiting');
            else if (select.value === 'ordered') select.classList.add('status-ordered');
            else if (select.value === 'unavailable') select.classList.add('status-unavailable');
        }

        async function saveChanges(id, btn) {
            const row = btn.closest('tr');
            const newState = row.querySelector('select').value;
            const newCompany = row.querySelector('.company-input').value;
            
            btn.disabled = true;
            btn.innerText = "⏳";

            const success = await updateData({ id: id, state: newState, company: newCompany });
            if (success) {
                alert("تم التحديث ✅");
                loadOrders(); 
            } else {
                alert("فشل الحفظ ❌");
                btn.disabled = false;
                btn.innerText = "حفظ";
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
