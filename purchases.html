<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتريات - اختبار شامل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="user-info">المستخدم: <span id="displayUser">...</span></div>
        <div class="logo"><b>فحص سجل البيانات الشامل</b></div>
        <button class="btn btn-danger" onclick="logout()">خروج</button>
    </header>

    <div class="container">
        <div class="card">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #fff3cd; padding: 10px; border-radius: 8px; border: 1px solid #ffeeba;">
                <label>تصفية الحالة:</label>
                <select id="statusFilter" onchange="renderTable()" style="padding: 5px;">
                    <option value="all" selected>عرض كل البيانات (بدون استثناء)</option>
                    <option value="new">انتظار فقط</option>
                </select>
                <button class="btn btn-success" onclick="loadPurchases()">تحديث البيانات من السيرفر ↻</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="purchasesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>النوع</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const user = checkAuth();
        document.getElementById('displayUser').innerText = user;
        let allData = [];

// دالة جلب البيانات مع فك التغليف البرمجي
async function loadPurchases() {
    const tbody = document.querySelector('#purchasesTable tbody');
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">جاري جلب البيانات...</td></tr>';
    
    try {
        const response = await fetchData();
        
        // فك تغليف البيانات بناءً على صورة الـ Network الأخيرة
        if (Array.isArray(response) && response[0] && response[0].data) {
            allData = response[0].data; // الوصول للمصفوفة داخل حقل data
        } else {
            allData = Array.isArray(response) ? response : (response.data || []);
        }

        renderTable();
    } catch (error) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:red;">خطأ في الاتصال بالسيرفر</td></tr>';
    }
}

// دالة العرض مع الألوان والفلترة
function renderTable() {
    const tbody = document.querySelector('#purchasesTable tbody');
    const filterValue = document.getElementById('statusFilter').value;
    
    // تصفية البيانات حسب الحالة المختارة
    let filtered = allData.filter(o => {
        const status = String(o.state || o.status || "").trim().toLowerCase();
        if (filterValue === 'all') return true;
        if (filterValue === 'waiting') return status === "" || status === "null" || status.includes('{');
        return status === filterValue;
    });

    tbody.innerHTML = '';

    filtered.forEach(o => {
        const currentStatus = String(o.state || o.status || "").trim().toLowerCase();
        const rowID = o.id || o.ID || "بدون ID";
        
        // تحديد لون الخانة بناءً على الحالة
        let statusClass = "status-waiting"; // افتراضي أزرق
        if (currentStatus === 'ordered') statusClass = "status-ordered"; // أخضر
        if (currentStatus === 'unavailable') statusClass = "status-unavailable"; // أحمر

        const row = `<tr>
            <td>${rowID}</td>
            <td>${o.type || 'شراء'}</td>
            <td>${o.branch || ''}</td>
            <td>${o.item || ''}</td>
            <td>${o.qty || ''}</td>
            <td>
                <select id="status-${rowID}" class="form-select ${statusClass}" onchange="this.className='form-select ' + getStatusClass(this.value)">
                    <option value="" ${statusClass === 'status-waiting' ? 'selected' : ''}>انتظار ⏳</option>
                    <option value="ordered" ${currentStatus === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                    <option value="unavailable" ${currentStatus === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                </select>
            </td>
            <td><button class="btn btn-success btn-sm" onclick="updateStatus('${rowID}')">حفظ</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
    });
}

// دالة مساعدة لتغيير اللون فوراً عند اختيار حالة جديدة
function getStatusClass(val) {
    if (val === 'ordered') return 'status-ordered';
    if (val === 'unavailable') return 'status-unavailable';
    return 'status-waiting';
}

        function renderTable() {
            const tbody = document.querySelector('#purchasesTable tbody');
            const filterValue = document.getElementById('statusFilter').value;
            
            // تم إلغاء فلترة الـ type بناءً على طلبك ليعرض كل شيء
            let filtered = [...allData]; 

            // تصفية بسيطة فقط لو اخترت "انتظار"
            if (filterValue === 'new') {
                filtered = filtered.filter(item => {
                    const s = String(item.state || item.status || "").trim().toLowerCase();
                    return s === "" || s === "null" || s === "undefined";
                });
            }

            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا يوجد بيانات في الجدول حالياً</td></tr>';
                return;
            }

            filtered.forEach(o => {
                // n8n يستخدم state في جدولك
                const currentStatus = String(o.state || o.status || "").trim().toLowerCase();
                const rowID = o.id || "بدون ID";

                const row = `<tr>
                    <td>${rowID}</td>
                    <td>${o.type || 'غير محدد'}</td>
                    <td>${o.branch || ''}</td>
                    <td>${o.item || ''}</td>
                    <td>${o.qty || ''}</td>
                    <td>
                        <select id="status-${rowID}">
                            <option value="" ${currentStatus === "" || currentStatus === "null" ? 'selected' : ''}>انتظار</option>
                            <option value="ordered" ${currentStatus === 'ordered' ? 'selected' : ''}>تم الطلب</option>
                            <option value="unavailable" ${currentStatus === 'unavailable' ? 'selected' : ''}>غير متوفر</option>
                        </select>
                    </td>
                    <td><button class="btn btn-success" onclick="updateStatus('${rowID}')">حفظ</button></td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        async function updateStatus(id) {
            if (id === "بدون ID") { alert("لا يمكن تحديث سطر بدون ID"); return; }
            const data = {
                id: id,
                status: document.getElementById(`status-${id}`).value,
                action: 'update_status'
            };
            try {
                await postData(data);
                alert("تم الحفظ");
                loadPurchases();
            } catch (e) { alert("خطأ في الحفظ"); }
        }

        window.onload = loadPurchases;
    </script>
</body>
</html>
