<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="user-info">المستخدم الحالي: <span id="displayUser">...</span></div>
        <div class="logo"><b>سجل المشتريات المركزي</b></div>
        <button class="btn btn-danger" onclick="logout()">خروج</button>
    </header>

    <nav class="nav-menu">
        <a href="main.html" class="nav-link">إضافة طلب</a>
        <a href="purchases.html" class="nav-link active">المشتريات</a>
    </nav>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0;">طلبات الشراء الواردة</h2>
                <button class="btn btn-success" onclick="loadPurchases()">تحديث البيانات ↻</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="purchasesTable">
                    <thead>
                        <tr>
                            <th>التاريخ (CreatedAt)</th>
                            <th>الفرع</th>
                            <th>المنتج (Item)</th>
                            <th>الكمية (Qty)</th>
                            <th>بواسطة (User)</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // التأكد من الهوية
        const user = checkAuth();
        document.getElementById('displayUser').innerText = user;

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        async function loadPurchases() {
            const tbody = document.querySelector('#purchasesTable tbody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">جاري جلب البيانات من n8n...</td></tr>';

            try {
                const data = await fetchData(); // جلب البيانات باستخدام api.js
                
                // فلترة البيانات لتظهر "شراء" فقط بناءً على حقل type في n8n
                const purchaseOrders = data.filter(order => order.type === 'شراء');

                tbody.innerHTML = ''; 

                if (purchaseOrders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد بيانات شراء متاحة حالياً</td></tr>';
                    return;
                }

                // رسم الجدول بناءً على هيكلة JSON في الصورة (user, type, branch, item, qty, createdAt)
                purchaseOrders.forEach(order => {
                    const row = `
                        <tr>
                            <td>${new Date(order.createdAt).toLocaleString('ar-EG') || '-'}</td>
                            <td>${order.branch || '-'}</td>
                            <td>${order.item || '-'}</td>
                            <td>${order.qty || '-'}</td>
                            <td>${order.user || '-'}</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">خطأ في الاتصال بالـ Webhook. تأكد من تشغيل الـ Workflow في n8n</td></tr>';
            }
        }

        window.onload = loadPurchases;
    </script>
</body>
</html>
