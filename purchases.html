<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - صيدلية د. إبراهيم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html" class="active">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="inventory.html">📋 الجرد</a> 
            <a href="notifications.html">🔔 الإشعارات</a> 
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">سجل المشتريات (n8n Data Table) 🛒</h2>

            <div class="filter-box" style="background: #fff9c4; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fbc02d;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button onclick="loadOrders()" class="btn-success" style="width: auto;">تحديث 🔄</button>
                    <div>
                        <label>الحالة:</label>
                        <select id="statusFilter" onchange="applyFilter()" style="padding: 5px;">
                            <option value="all">الكل</option>
                            <option value="pending" selected>انتظار ⏳</option>
                            <option value="ordered">تم الطلب ✅</option>
                            <option value="unavailable">غير متوفر ❌</option>
                        </select>
                    </div>
                </div>
                <div id="branchList" style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
            </div>

            <div style="overflow-x: auto;">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>الفرع</th>
                            <th>كود الصنف</th>
                            <th>اسم الصنف</th>
                            <th>الكمية</th>
                            <th>المورد</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="8" style="text-align:center;">جاري جلب بيانات الجدول...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        let rawData = [];

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadOrders;
        }

        async function loadOrders() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">⏳ جاري فحص مخرجات n8n...</td></tr>';
            
            try {
                const response = await fetchOrders();
                console.log("n8n Data Table Output:", response);

                // استخراج المصفوفة من نود Data Table (غالباً تكون في response مباشرة أو response.data)
                let items = [];
                if (Array.isArray(response)) items = response;
                else if (response.data && Array.isArray(response.data)) items = response.data;
                else if (typeof response === 'object') items = Object.values(response).find(Array.isArray) || [];

                if (items.length > 0) {
                    // توحيد الحقول لتناسب n8n Data Table
                    rawData = items.map(item => {
                        const find = (keys) => {
                            for (let k of keys) {
                                if (item[k] !== undefined) return item[k];
                            }
                            return '-';
                        };

                        return {
                            id: find(['id', 'ID', 'row_id', 'record_id']),
                            branch: find(['branch', 'Branch', 'الفرع']),
                            item_code: find(['item_code', 'code', 'كود الصنف']),
                            item_name: find(['item_name', 'name', 'اسم الصنف', 'الصنف']),
                            qty: find(['qty', 'quantity', 'الكمية']),
                            company: find(['company', 'المورد', 'ملاحظات']) || '',
                            state: find(['state', 'status', 'الحالة']) || 'pending',
                            type: find(['type', 'النوع'])
                        };
                    }).filter(i => String(i.type).includes("شراء"));

                    if (rawData.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لم يتم العثور على سجلات "شراء" في الجدول</td></tr>';
                    } else {
                        generateBranches(rawData);
                        applyFilter();
                    }
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">الجدول فارغ في n8n</td></tr>';
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:red;">خطأ: ${e.message}</td></tr>`;
            }
        }

        function generateBranches(data) {
            const container = document.getElementById('branchList');
            const branches = [...new Set(data.map(i => i.branch))].filter(b => b !== '-');
            container.innerHTML = branches.map(b => `
                <label style="background:white; padding:2px 8px; border-radius:15px; border:1px solid #fbc02d; font-size:12px;">
                    <input type="checkbox" class="branch-cb" value="${b}" checked onchange="applyFilter()"> ${b}
                </label>
            `).join('');
        }

        function applyFilter() {
            const status = document.getElementById('statusFilter').value;
            const selectedBranches = Array.from(document.querySelectorAll('.branch-cb:checked')).map(c => c.value);
            
            const filtered = rawData.filter(i => {
                const sMatch = (status === 'all' || i.state === status);
                const bMatch = selectedBranches.includes(i.branch);
                return sMatch && bMatch;
            });
            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = items.map(i => `
                <tr>
                    <td>${i.id}</td>
                    <td><b>${i.branch}</b></td>
                    <td>${i.item_code}</td>
                    <td>${i.item_name}</td>
                    <td>${i.qty}</td>
                    <td><input type="text" value="${i.company}" class="comp-in" style="width:80px"></td>
                    <td>
                        <select class="stat-sel">
                            <option value="pending" ${i.state==='pending'?'selected':''}>انتظار</option>
                            <option value="ordered" ${i.state==='ordered'?'selected':''}>تم الطلب</option>
                            <option value="unavailable" ${i.state==='unavailable'?'selected':''}>غير متوفر</option>
                        </select>
                    </td>
                    <td><button class="btn-success" onclick="saveRow('${i.id}', this)" style="padding:2px 8px">حفظ</button></td>
                </tr>
            `).join('') || '<tr><td colspan="8" style="text-align:center;">لا توجد نتائج</td></tr>';
        }

        async function saveRow(id, btn) {
            const row = btn.closest('tr');
            const data = {
                id: id,
                status: row.querySelector('.stat-sel').value,
                company: row.querySelector('.comp-in').value,
                type: "شراء",
                action: "update_status"
            };
            btn.disabled = true;
            const ok = await updateData(data);
            if(ok) { alert("تم ✅"); loadOrders(); }
            else { alert("فشل ❌"); btn.disabled = false; }
        }
    </script>
</body>
</html>
