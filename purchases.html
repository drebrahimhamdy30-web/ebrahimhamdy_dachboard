<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل المشتريات - الصيدلية</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="header">
        <span>المستخدم: <strong id="display-user"></strong></span>
        <button onclick="logout()">خروج</button>
    </div>

    <div class="container">
        <h2>فحص سجل البيانات الشامل</h2>
        
        <div id="status-message" style="color: red; text-align: center;"></div>

        <table id="orders-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>النوع</th>
                    <th>الفرع</th>
                    <th>المنتج</th>
                    <th>الكمية</th>
                    <th>الحالة</th>
                    <th id="action-header">إجراء</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script src="api.js"></script>
    <script>
        // 1. التأكد من هوية المستخدم
        const activeUser = checkAuth();
        const userRole = localStorage.getItem('userRole');
        const userBranch = localStorage.getItem('userBranch');

        if (activeUser) {
            document.getElementById('display-user').innerText = activeUser + " (" + userBranch + ")";
            loadOrders();
        }

        async function loadOrders() {
            const tbody = document.getElementById('table-body');
            const msg = document.getElementById('status-message');
            
            const data = await fetchData();
            
            if (!data) {
                msg.innerText = "خطأ في الاتصال بالسيرفر أو تفعيل CORS";
                return;
            }

            tbody.innerHTML = '';
            data.forEach(order => {
                const row = document.createElement('tr');
                
                // تحديد ما إذا كان المستخدم يملك صلاحية التعديل
                const isDisabled = (userRole === 'employee') ? 'disabled' : '';
                
                row.innerHTML = `
                    <td>${order.id}</td>
                    <td>${order.type}</td>
                    <td>${order.branch}</td>
                    <td>${order.product}</td>
                    <td>${order.quantity}</td>
                    <td>
                        <select onchange="updateStatus('${order.id}', this.value)" ${isDisabled}>
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>في الانتظار</option>
                            <option value="ordered" ${order.status === 'ordered' ? 'selected' : ''}>تم الطلب</option>
                            <option value="unavailable" ${order.status === 'unavailable' ? 'selected' : ''}>غير متوفر</option>
                        </select>
                    </td>
                    <td>
                        <button onclick="saveChanges('${order.id}')" ${isDisabled}>حفظ</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // إخفاء عمود الإجراءات بالكامل للموظف لزيادة الأمان
            if (userRole === 'employee') {
                document.getElementById('action-header').style.display = 'none';
            }
        }

        async function updateStatus(id, newStatus) {
            console.log(`تحديث الطلب ${id} إلى ${newStatus}`);
        }

        async function saveChanges(id) {
            // كود الحفظ المرتبط بنود n8n التحديث
            alert("جاري حفظ التعديلات للطلب رقم: " + id);
        }
    </script>
</body>
</html>
