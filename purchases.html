<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="user-info">المستخدم: <span id="displayUser">...</span></div>
        <div class="logo"><b>إدارة المشتريات المركزي</b></div>
        <button class="btn btn-danger" onclick="logout()">خروج</button>
    </header>

    <nav class="nav-menu">
        <a href="main.html" class="nav-link">إضافة طلب</a>
        <a href="purchases.html" class="nav-link active">المشتريات</a>
    </nav>

    <div class="container">
        <div class="card">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 8px;">
                <label>تصفية حسب الحالة:</label>
                <select id="statusFilter" onchange="renderTable()" style="padding: 5px;">
                    <option value="new" selected>طلبات جديدة (انتظار)</option>
                    <option value="ordered">تم الطلب ✅</option>
                    <option value="unavailable">غير متوفر ❌</option>
                    <option value="all">الكل (سجل المشتريات)</option>
                </select>
                <button class="btn btn-success" onclick="loadPurchases()">تحديث البيانات ↻</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="purchasesTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th>الشركة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const user = checkAuth();
        document.getElementById('displayUser').innerText = user;
        let allData = [];

        async function loadPurchases() {
            const tbody = document.querySelector('#purchasesTable tbody');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري الجلب...</td></tr>';
            try {
                allData = await fetchData();
                renderTable();
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">خطأ في الاتصال</td></tr>';
            }
        }

        function renderTable() {
            const tbody = document.querySelector('#purchasesTable tbody');
            const filter = document.getElementById('statusFilter').value;
            
            // 1. تصفية أولية لنوع "شراء" فقط
            let filtered = allData.filter(o => o.type === 'شراء');

            // 2. تطبيق التصفية المختارة من القائمة (الافتراضي عند الفتح هو new)
            if (filter === 'new') {
                filtered = filtered.filter(o => !o.status || o.status === '' || o.status === 'انتظار');
            } else if (filter !== 'all') {
                filtered = filtered.filter(o => o.status === filter);
            }

            // 3. فرز البيانات زمنياً (الأحدث يظهر أولاً)
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا توجد طلبات حالياً</td></tr>';
                return;
            }

            filtered.forEach(o => {
                const row = `<tr>
                    <td>${formatDate(o.createdAt)}</td>
                    <td>${o.branch}</td>
                    <td>${o.item}</td>
                    <td>${o.qty}</td>
                    <td>
                        <select id="status-${o.id}">
                            <option value="" ${(!o.status || o.status === '') ? 'selected' : ''}>انتظار ⏳</option>
                            <option value="ordered" ${o.status === 'ordered' ? 'selected' : ''}>تم الطلب ✅</option>
                            <option value="unavailable" ${o.status === 'unavailable' ? 'selected' : ''}>غير متوفر ❌</option>
                        </select>
                    </td>
                    <td><input type="text" id="company-${o.id}" value="${o.company || ''}" placeholder="اسم الشركة" style="width:100px; padding:4px;"></td>
                    <td><button class="btn btn-success" onclick="updateStatus('${o.id}')">حفظ</button></td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        async function updateStatus(id) {
            const saveBtn = event.target;
            const originalText = saveBtn.innerText;
            
            const data = {
                id: id,
                status: document.getElementById(`status-${id}`).value,
                company: document.getElementById(`company-${id}`).value,
                action: 'update_status'
            };
            
            try {
                saveBtn.innerText = "جاري...";
                saveBtn.disabled = true;
                await postData(data);
                alert("تم تحديث حالة الطلب بنجاح");
                await loadPurchases(); // إعادة الجلب لتحديث الجدول واختفاء الطلب من فلتر "الجديد"
            } catch (e) { 
                alert("فشل الحفظ، يرجى المحاولة مرة أخرى");
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
            }
        }

        window.onload = loadPurchases;
    </script>
</body>
</html>
