<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #edf2f7; vertical-align: middle; }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 700; border-top: 2px solid #e2e8f0; }
        tr:hover { background-color: #f7fafc; }
        .stat-sel { padding: 5px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #cbd5e0; background: white; }
        .comp-in { padding: 5px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #cbd5e0; width: 95%; }
        .btn-save { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #218838; }
        .data-sub { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
        .data-main { font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html"><i class="fas fa-plus"></i> مدخلات</a>
            <a href="purchases.html" class="active"><i class="fas fa-shopping-cart"></i> مشتريات</a>
            <a href="transfers.html"><i class="fas fa-exchange-alt"></i> تحويلات</a>
            <a href="inventory.html"><i class="fas fa-list"></i> جرد</a> 
            <a href="notifications.html"><i class="fas fa-bell"></i> إشعارات</a> 
        </div>
        <div class="user-info" style="color: white; font-size: 0.8rem;">
            <span id="nav-user"></span>
            <button onclick="logout()" style="background:transparent; border:1px solid #fff; color:white; border-radius:4px; cursor:pointer; margin-right:10px; padding: 2px 8px;">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; font-size: 1.1rem; color: var(--primary);">🛒 سجل المشتريات والطلبيات</h3>
                <button onclick="loadOrders()" class="btn-done" style="background: #3498db; padding: 5px 15px; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    <i class="fas fa-sync-alt"></i> تحديث البيانات
                </button>
            </div>

            <div class="filter-box" style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                    <span><i class="fas fa-filter"></i> تصفية بالحالة:</span>
                    <select id="statusFilter" onchange="applyFilter()" class="stat-sel" style="width: 150px;">
                        <option value="all">عرض الكل</option>
                        <option value="pending" selected>قيد الانتظار ⏳</option>
                        <option value="ordered">تم الطلب ✅</option>
                        <option value="unavailable">غير متوفر ❌</option>
                    </select>
                </div>
                <div id="branchList" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th style="width: 10%;">الفرع</th>
                            <th style="width: 25%;">بيانات الصنف</th>
                            <th style="width: 20%;">بيانات العميل</th>
                            <th style="width: 8%;">الكمية</th>
                            <th style="width: 20%;">المورد / ملاحظات</th>
                            <th style="width: 12%;">الحالة</th>
                            <th style="width: 5%;">حفظ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="7" style="text-align:center; padding: 30px;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        let rawData = [];

        if (activeUser) {
            document.getElementById('nav-user').innerText = activeUser;
            window.onload = loadOrders;
        }

        async function loadOrders() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">⏳ جاري جلب البيانات...</td></tr>';
            
            try {
                const response = await fetchOrders();
                // التعامل مع اختلاف شكل البيانات القادمة
                let items = (response && response[0]?.data) ? response[0].data : (response.data || response);

                if (Array.isArray(items) && items.length > 0) {
                    rawData = items.map(item => ({
                        id: item.id || item.row_id || item.ID,
                        branch: item.branch || '-',
                        item_code: item.item_code || 'بدون كود',
                        item_name: item.item || item.item_name || 'صنف غير مسمى',
                        customer_code: item.customer_code || '---',
                        customer_name: item.customer_name || 'عميل عام',
                        qty: item.qty || 0,
                        company: (item.company && item.company !== 'null') ? item.company : '',
                        state: (item.state === '-' || !item.state) ? 'pending' : item.state,
                        type: item.type || ''
                    })).filter(i => String(i.type).includes("شراء"));

                    generateBranches(rawData);
                    applyFilter();
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا توجد طلبات شراء حالياً</td></tr>';
                }
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">خطأ في تحميل البيانات</td></tr>';
            }
        }

        function generateBranches(data) {
            const container = document.getElementById('branchList');
            const branches = [...new Set(data.map(i => i.branch))].filter(b => b !== '-').sort();
            container.innerHTML = branches.map(b => `
                <label style="font-size: 0.8rem; background: white; padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 1px solid #cbd5e0; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" class="branch-cb" value="${b}" checked onchange="applyFilter()"> ${b}
                </label>
            `).join('');
        }

        function applyFilter() {
            const status = document.getElementById('statusFilter').value;
            const selectedBranches = Array.from(document.querySelectorAll('.branch-cb:checked')).map(c => c.value);
            
            const filtered = rawData.filter(i => {
                const sMatch = (status === 'all' || i.state === status);
                const bMatch = selectedBranches.includes(i.branch);
                return sMatch && bMatch;
            });
            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">لا توجد نتائج تطابق الفلتر</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(i => `
                <tr>
                    <td class="data-main" style="color:#2c3e50;">${i.branch}</td>
                    <td style="text-align:right; padding-right:15px;">
                        <div class="data-main">${i.item_name}</div>
                        <div class="data-sub"><i class="fas fa-barcode"></i> ${i.item_code}</div>
                    </td>
                    <td style="text-align:right;">
                        <div class="data-main">${i.customer_name}</div>
                        <div class="data-sub"><i class="fas fa-user-tag"></i> ${i.customer_code}</div>
                    </td>
                    <td style="font-weight:bold; font-size:1rem; color:#e67e22;">${i.qty}</td>
                    <td><input type="text" value="${i.company}" id="comp-${i.id}" class="comp-in" placeholder="المورد أو ملاحظة..."></td>
                    <td>
                        <select id="stat-${i.id}" class="stat-sel">
                            <option value="pending" ${i.state==='pending'?'selected':''}>⏳ انتظار</option>
                            <option value="ordered" ${i.state==='ordered'?'selected':''}>✅ تم الطلب</option>
                            <option value="unavailable" ${i.state==='unavailable'?'selected':''}>❌ نقص</option>
                        </select>
                    </td>
                    <td><button class="btn-save" onclick="saveRow('${i.id}', this)"><i class="fas fa-save"></i></button></td>
                </tr>
            `).join('');
        }

        async function saveRow(id, btn) {
            const status = document.getElementById(`stat-${id}`).value;
            const company = document.getElementById(`comp-${id}`).value;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            // إرسال البيانات المحدثة لـ n8n
            const success = await updateData({ 
                id: id, 
                status: status, 
                company: company, 
                type: "شراء", 
                action: "update_status" 
            });

            if (success) {
                btn.style.background = "#2ecc71";
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => {
                    btn.style.background = "#28a745";
                    btn.innerHTML = '<i class="fas fa-save"></i>';
                    btn.disabled = false;
                    loadOrders(); // إعادة تحميل للتأكد من التزامن
                }, 1500);
            } else {
                alert("حدث خطأ أثناء حفظ البيانات");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i>';
            }
        }
    </script>
</body>
</html>
