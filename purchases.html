<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-links">
            <a href="main.html">➕ مدخلات جديدة</a>
            <a href="purchases.html" class="active">🛒 سجل المشتريات</a>
            <a href="transfers.html">🔄 التحويلات</a>
            <a href="notifications.html">🔔 الإشعارات</a>
        </div>
        <div class="user-info">
            <span id="nav-user"></span>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">فحص سجل البيانات الشامل</h2>

            <div style="background: #fff9c4; padding: 15px; border-radius: 8px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #fbc02d; gap: 10px;">
                <button onclick="loadOrders()" class="btn-success" style="width: auto; padding: 8px 15px;">تحديث البيانات من السيرفر 🔄</button>
                <div>
                    <label style="font-weight: bold; margin-left: 10px;">تصفية حسب الحالة:</label>
                    <select id="statusFilter" onchange="applyFilter()" style="width: 200px; padding: 5px; border-radius: 5px;">
                        <option value="all">عرض الكل (بدون استثناء)</option>
                        <option value="pending">في الانتظار ⏳</option>
                        <option value="ordered">تم الطلب ✅</option>
                        <option value="unavailable">غير متوفر ❌</option>
                    </select>
                </div>
            </div>
            
            <div id="status-message" style="color: red; text-align: center; margin-bottom: 10px;"></div>

            <div style="overflow-x: auto;">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>النوع</th>
                            <th>الفرع</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th id="action-header">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const activeUser = checkAuth();
        const userRole = localStorage.getItem('userRole');
        const userBranch = localStorage.getItem('userBranch');
        let rawData = []; 

        if (activeUser) {
            document.getElementById('nav-user').innerText = `${activeUser} (${userBranch})`;
            loadOrders();
        }

        async function loadOrders() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري التحميل...</td></tr>';
            
            const data = await fetchData(); // استدعاء الدالة من api.js
            
            if (!data) {
                document.getElementById('status-message').innerText = "خطأ في الاتصال بالسيرفر";
                tbody.innerHTML = '';
                return;
            }

            rawData = data; 
            renderTable(rawData);
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            items.forEach(order => {
                const row = document.createElement('tr');
                const isDisabled = (userRole === 'employee') ? 'disabled' : '';
                
                // حل مشكلة الـ undefined بفحص المسميات المختلفة
                const product = order.product || order.item || 'undefined';
                const quantity = order.quantity || order.qty || '0';

                // تنسيق لون الحالة
                let statusClass = '';
                if (order.status === 'pending') statusClass = 'status-waiting';
                else if (order.status === 'ordered') statusClass = 'status-ordered';
                else if (order.status === 'unavailable') statusClass = 'status-unavailable';

                row.innerHTML = `
                    <td>${order.id}</td>
                    <td>${order.type}</td>
                    <td>${order.branch}</td>
                    <td>${product}</td>
                    <td>${quantity}</td>
                    <td>
                        <select class="form-select ${statusClass}" onchange="updateStatusColor(this)" ${isDisabled}>
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>في الانتظار</option>
                            <option value="ordered" ${order.status === 'ordered' ? 'selected' : ''}>تم الطلب</option>
                            <option value="unavailable" ${order.status === 'unavailable' ? 'selected' : ''}>غير متوفر</option>
                        </select>
                    </td>
                    <td class="action-cell">
                        <button class="btn-success" style="padding: 5px 12px; font-size: 0.8rem; width: auto;" 
                                onclick="saveChanges('${order.id}', this)" ${isDisabled}>حفظ</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            if (userRole === 'employee') {
                document.getElementById('action-header').style.display = 'none';
                document.querySelectorAll('.action-cell').forEach(c => c.style.display = 'none');
            }
        }

        function applyFilter() {
            const val = document.getElementById('statusFilter').value;
            renderTable(val === 'all' ? rawData : rawData.filter(o => o.status === val));
        }

        function updateStatusColor(select) {
            select.classList.remove('status-waiting', 'status-ordered', 'status-unavailable');
            if (select.value === 'pending') select.classList.add('status-waiting');
            else if (select.value === 'ordered') select.classList.add('status-ordered');
            else if (select.value === 'unavailable') select.classList.add('status-unavailable');
        }

        async function saveChanges(id, btn) {
            const row = btn.closest('tr');
            const newStatus = row.querySelector('select').value;
            btn.disabled = true;
            btn.innerText = "⏳";

            const success = await updateData({ id: id, status: newStatus });
            if (success) {
                alert("تم الحفظ ✅");
                loadOrders(); 
            } else {
                alert("فشل الحفظ ❌");
                btn.disabled = false;
                btn.innerText = "حفظ";
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
